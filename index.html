<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevatus 保障需求分析系統 v2.0 | Jimmy Chuang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .card { background: white; padding: 1.5rem; border-radius: 1.5rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 1.5rem; }
        .input-label { display: block; color: #64748b; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.25rem; text-transform: uppercase; }
        input[type="number"], input[type="text"], select { 
            width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0.6rem 1rem; color: #334155; transition: all 0.2s;
        }
        input:focus { @apply border-blue-500 ring-2 ring-blue-100 outline-none; }
        .section-title { font-size: 1.25rem; font-weight: 900; margin-bottom: 1.25rem; display: flex; align-items: center; color: #1e293b; border-left: 5px solid #2563eb; padding-left: 0.75rem; }
        .ltc-input-group { @apply grid grid-cols-1 md:grid-cols-3 gap-4 mt-4 p-4 bg-slate-50 rounded-xl border border-slate-100; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">保障需求分析系統 <span class="text-blue-600">v2.0</span></h1>
                <p class="text-slate-500 font-medium text-sm">Elevatus Business Consultants | 專業跨境財務諮詢</p>
            </div>
            <div class="bg-white px-6 py-3 rounded-2xl border border-slate-100 text-right shadow-sm">
                <p class="text-sm font-bold text-slate-800">顧問：Jimmy Chuang</p>
                <p id="display_date" class="text-xs text-slate-400"></p>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8 items-start">
            
            <div class="w-full lg:w-2/3">
                <section class="card">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="input-label">客戶姓名 / 案件代號</label><input type="text" id="client_name" value="王先生"></div>
                        <div><label class="input-label">諮詢備註</label><input type="text" id="notes" value="一家四口"></div>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title text-red-600 border-red-600">01. 家庭責任與身故保障</h2>
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-red-50/50 p-4 rounded-xl">
                            <div><label class="input-label">房屋貸款餘額 (USD)</label><input type="number" id="mortgage" value="350000" oninput="calculate()"></div>
                            <div><label class="input-label">其他個人/商業貸款</label><input type="number" id="other_debt" value="100000" oninput="calculate()"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-blue-50/50 p-4 rounded-xl">
                            <div><label class="input-label">目前年收入 (USD)</label><input type="number" id="annual_income" value="80000" oninput="calculate()"></div>
                            <div><label class="input-label">預計替代年數</label>
                                <select id="income_years" onchange="calculate()">
                                    <option value="5">5 年</option><option value="10" selected>10 年</option><option value="15">15 年</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-emerald-50/50 p-4 rounded-xl">
                            <div><label class="input-label">每位子女教育預算</label><input type="number" id="edu_per_child" value="150000" oninput="calculate()"></div>
                            <div><label class="input-label">子女數量</label><input type="number" id="child_count" value="2" oninput="calculate()"></div>
                        </div>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title text-orange-500 border-orange-500">02. 醫療與重疾應急金</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="input-label">醫療自付上限 (OOP Max x 2年)</label><input type="number" id="medical_oop" value="18000" oninput="calculate()"></div>
                        <div><label class="input-label">重疾康復生活費 (1-2年年薪)</label><input type="number" id="recovery_fund" value="160000" oninput="calculate()"></div>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title text-purple-600 border-purple-600">03. 長期照護跨境選擇</h2>
                    <div class="flex bg-slate-100 p-1 rounded-xl mb-4 gap-1">
                        <button id="btn_us" onclick="setLTCPath('US')" class="flex-1 py-3 rounded-lg font-bold text-sm bg-white shadow-sm text-blue-600 transition-all">美國各州在地照護</button>
                        <button id="btn_tw" onclick="setLTCPath('TW')" class="flex-1 py-3 rounded-lg font-bold text-sm text-slate-500 transition-all">返回台灣跨境照護</button>
                    </div>

                    <div id="us_ltc_details" class="space-y-4">
                        <div class="flex justify-between items-center bg-blue-50 p-3 rounded-lg">
                            <span class="text-sm font-bold text-blue-800">🔍 查詢最新各州數據：</span>
                            <a href="https://www.carescout.com/cost-of-care" target="_blank" class="text-xs bg-blue-600 text-white px-3 py-1.5 rounded-full hover:bg-blue-700 transition">CareScout (Genworth) 官網</a>
                        </div>
                        <div class="ltc-input-group">
                            <div>
                                <label class="input-label">In-Home Care (月)</label>
                                <input type="number" id="us_inhome" value="6500" oninput="calculate()">
                            </div>
                            <div>
                                <label class="input-label">Assisted Living (月)</label>
                                <input type="number" id="us_assisted" value="5500" oninput="calculate()">
                            </div>
                            <div>
                                <label class="input-label">Nursing Home (月)</label>
                                <input type="number" id="us_nursing" value="10500" oninput="calculate()">
                            </div>
                        </div>
                    </div>

                    <div id="tw_ltc_details" class="hidden p-4 bg-purple-50 rounded-xl border border-purple-100">
                        <p class="text-sm text-purple-800 font-bold mb-2">台灣長期照護行情預估：</p>
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-purple-600 italic">包含外籍看護或優質機構月費：</span>
                            <span class="text-lg font-black text-purple-700">$3,200 / Month</span>
                        </div>
                    </div>
                </section>

                <section class="card bg-slate-900 text-white">
                    <h2 class="text-lg font-bold mb-4 flex items-center"><span class="mr-2">🛡️</span> 最後一步：扣除已擁有的資產</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="input-label text-slate-400">目前已有總保額 (USD)</label><input type="number" id="current_insurance" value="300000" oninput="calculate()" class="bg-slate-800 border-none text-white focus:bg-slate-700"></div>
                        <div><label class="input-label text-slate-400">流動性存款/投資 (USD)</label><input type="number" id="current_assets" value="50000" oninput="calculate()" class="bg-slate-800 border-none text-white focus:bg-slate-700"></div>
                    </div>
                </section>
            </div>

            <div class="w-full lg:w-1/3 lg:sticky lg:top-8">
                <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
                    <div class="bg-blue-600 p-8 text-center text-white">
                        <h3 class="text-xs font-bold opacity-60 uppercase tracking-[0.2em] mb-2">保障缺口分析總覽</h3>
                        <div id="total_gap_val" class="text-5xl font-black tracking-tighter">$0</div>
                    </div>
                    
                    <div class="p-8 space-y-6">
                        <div class="relative h-64 w-full">
                            <canvas id="gapChart"></canvas>
                        </div>

                        <div class="space-y-4 pt-4">
                            <div class="flex justify-between items-center border-b pb-3">
                                <p class="text-xs font-bold text-slate-400 uppercase">身故保障需求</p>
                                <p id="life_gap_val" class="text-xl font-bold text-red-600">$0</p>
                            </div>
                            <div class="flex justify-between items-center border-b pb-3">
                                <p class="text-xs font-bold text-slate-400 uppercase">生前福利需求</p>
                                <p id="medical_gap_val" class="text-xl font-bold text-orange-500">$0</p>
                            </div>
                            <div class="flex justify-between items-center border-b pb-3">
                                <p class="text-xs font-bold text-slate-400 uppercase">長期照護預備</p>
                                <p id="ltc_gap_val" class="text-xl font-bold text-purple-600">$0</p>
                            </div>
                        </div>

                        <div class="pt-4 space-y-3">
                            <button id="saveBtn" onclick="saveToSheet()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-black transition-all shadow-lg active:scale-95">儲存諮詢紀錄</button>
                            <button onclick="window.print()" class="w-full bg-slate-100 text-slate-500 font-bold py-3 rounded-xl text-sm hover:bg-slate-200">列印報告 PDF</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEsNTWhldPnUc1xxnUHJcaH14Wbd0J1CMSOnhI9r_5ckZ-jRwHEhPR1lZdptHe3H6o/exec";
        let globalRates = { US_LTC_Monthly: 8500, TW_LTC_Monthly: 3200 };
        let currentLTCPath = 'US';
        let myChart = null;

        window.onload = function() {
            document.getElementById('display_date').innerText = "諮詢日期：" + new Date().toLocaleDateString();
            initChart();
            calculate();
            fetch(SCRIPT_URL).then(res => res.json()).then(data => {
                globalRates = data;
                calculate();
            }).catch(e => calculate());
        };

        function setLTCPath(path) {
            currentLTCPath = path;
            const btnUs = document.getElementById('btn_us');
            const btnTw = document.getElementById('btn_tw');
            const usDetails = document.getElementById('us_ltc_details');
            const twDetails = document.getElementById('tw_ltc_details');

            if(path === 'US') {
                btnUs.className = "flex-1 py-3 rounded-lg font-bold text-sm bg-white shadow-sm text-blue-600";
                btnTw.className = "flex-1 py-3 rounded-lg font-bold text-sm text-slate-500";
                usDetails.classList.remove('hidden');
                twDetails.classList.add('hidden');
            } else {
                btnTw.className = "flex-1 py-3 rounded-lg font-bold text-sm bg-white shadow-sm text-blue-600";
                btnUs.className = "flex-1 py-3 rounded-lg font-bold text-sm text-slate-500";
                usDetails.classList.add('hidden');
                twDetails.classList.remove('hidden');
            }
            calculate();
        }

        function calculate() {
            // Inputs
            const mortgage = parseFloat(document.getElementById('mortgage').value) || 0;
            const other_debt = parseFloat(document.getElementById('other_debt').value) || 0;
            const income = (parseFloat(document.getElementById('annual_income').value) || 0) * (parseInt(document.getElementById('income_years').value) || 10);
            const edu = (parseFloat(document.getElementById('edu_per_child').value) || 0) * (parseInt(document.getElementById('child_count').value) || 0);
            const med = (parseFloat(document.getElementById('medical_oop').value) || 0) + (parseFloat(document.getElementById('recovery_fund').value) || 0);
            
            // LTC Calculation
            let ltc_total = 0;
            if(currentLTCPath === 'US') {
                const inHome = parseFloat(document.getElementById('us_inhome').value) || 0;
                const assisted = parseFloat(document.getElementById('us_assisted').value) || 0;
                const nursing = parseFloat(document.getElementById('us_nursing').value) || 0;
                // 假設平均照護需求分散在這三類，共 3 年
                ltc_total = ((inHome + assisted + nursing) / 3) * 12 * 3;
            } else {
                ltc_total = globalRates.TW_LTC_Monthly * 12 * 3;
            }

            const totalNeeds = (mortgage + other_debt + income + edu) + med + ltc_total + 20000;
            const currentIns = parseFloat(document.getElementById('current_insurance').value) || 0;
            const currentAssets = parseFloat(document.getElementById('current_assets').value) || 0;
            const totalResources = currentIns + currentAssets;
            const gap = Math.max(0, totalNeeds - totalResources);

            // Update UI
            document.getElementById('life_gap_val').innerText = '$' + Math.round(mortgage + other_debt + income + edu).toLocaleString();
            document.getElementById('medical_gap_val').innerText = '$' + Math.round(med).toLocaleString();
            document.getElementById('ltc_gap_val').innerText = '$' + Math.round(ltc_total).toLocaleString();
            document.getElementById('total_gap_val').innerText = '$' + Math.round(gap).toLocaleString();

            updateChart(mortgage + other_debt + income + edu, med, ltc_total, currentIns, currentAssets);
        }

        function initChart() {
            const ctx = document.getElementById('gapChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [
                        { // 外環：總保障需求 (Total Needs)
                            label: '保障需求',
                            data: [1, 1, 1],
                            backgroundColor: ['#ef4444', '#f97316', '#a855f7'], // 紅、橘、紫
                            borderWidth: 0,
                            weight: 1.5
                        },
                        { // 內環：現有保障 (Existing) vs 缺口 (Gap)
                            label: '現有資源',
                            data: [1, 1, 1],
                            backgroundColor: ['#1e293b', '#64748b', '#e2e8f0'], // 深灰(保險)、淺灰(資產)、白(缺口)
                            borderWidth: 0,
                            weight: 1
                        }
                    ]
                },
                options: {
                    cutout: '40%',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateChart(life, med, ltc, ins, asset) {
            const totalNeeds = life + med + ltc;
            const gap = Math.max(0, totalNeeds - (ins + asset));
            
            // 更新外環 (需求細分)
            myChart.data.datasets[0].data = [life, med, ltc];
            
            // 更新內環 (保險 vs 資產 vs 缺口)
            // 如果資源超過需求，缺口為 0
            myChart.data.datasets[1].data = [ins, asset, gap];
            myChart.update();
        }

        async function saveToSheet() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = '正在存檔...'; btn.disabled = true;
            const payload = {
                name: document.getElementById('client_name').value,
                ltcPath: currentLTCPath,
                totalGap: document.getElementById('total_gap_val').innerText,
                notes: document.getElementById('notes').value
            };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert('✅ 諮詢紀錄已儲存。');
            } catch (e) { alert('連線失敗'); }
            finally { btn.innerText = '儲存諮詢紀錄'; btn.disabled = false; }
        }
    </script>
</body>
</html>
