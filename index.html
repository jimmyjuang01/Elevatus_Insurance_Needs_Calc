<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevatus 保障需求分析系統 v2.6 | Jimmy Chuang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        
        /* 基礎卡片樣式 */
        .card { @apply bg-white p-6 rounded-2xl border border-slate-100 shadow-sm mb-6 transition-all; }
        
        /* 標準標籤樣式 */
        .input-label { @apply block text-slate-500 text-[11px] font-bold mb-1.5 uppercase tracking-wider; }
        
        /* 統一輸入框樣式：讓所有欄位（文字、下拉選單）視覺一致 */
        input[type="text"], select { 
            @apply w-full bg-slate-50 border border-slate-200 rounded-lg py-2.5 px-4 text-slate-700 font-semibold text-sm transition-all outline-none;
        }
        input:focus, select:focus { @apply bg-white border-blue-500 ring-4 ring-blue-50; }
        
        /* 各區塊標題線條 */
        .section-title { @apply text-xl font-black mb-5 flex items-center text-slate-800 border-l-4 pl-3; }
        
        /* 長照方案卡片 */
        .ltc-option-card { @apply flex items-center p-4 rounded-xl border border-slate-200 transition-all cursor-pointer mb-3 bg-white; }
        .ltc-option-card.active { @apply border-blue-500 bg-blue-50/50 shadow-sm; }
        
        /* 現有資產區塊專屬（綠色系） */
        .asset-input { @apply bg-emerald-50/50 border-emerald-100 text-emerald-900; }
        .asset-input:focus { @apply bg-white border-emerald-500 ring-4 ring-emerald-100; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight italic">ELEVATUS <span class="text-blue-600 not-italic text-2xl ml-1">保障需求分析 v2.6</span></h1>
                <p class="text-slate-500 font-medium text-[11px] tracking-[0.3em] uppercase mt-1">Professional Cross-Border Financial Consulting</p>
            </div>
            <div class="bg-white px-6 py-3 rounded-2xl border border-slate-100 text-right shadow-sm">
                <p class="text-sm font-bold text-slate-800 tracking-tight">顧問：Jimmy Chuang</p>
                <p id="display_date" class="text-[10px] text-slate-400 font-medium"></p>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8 items-start">
            
            <div class="w-full lg:w-2/3">
                <section class="card">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="input-label">客戶姓名 / 案件代號</label><input type="text" id="client_name" value="王先生"></div>
                        <div><label class="input-label">諮詢備註</label><input type="text" id="notes" value="一家四口"></div>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title text-red-600 border-red-500">01. 家庭責任與身故保障</h2>
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-red-50/30 p-4 rounded-xl">
                            <div><label class="input-label text-red-700">房屋貸款餘額 (USD)</label><input type="text" id="mortgage" value="$350,000" oninput="handleCurrencyInput(this)"></div>
                            <div><label class="input-label text-red-700">其他個人/商業貸款</label><input type="text" id="other_debt" value="$100,000" oninput="handleCurrencyInput(this)"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-blue-50/30 p-4 rounded-xl">
                            <div><label class="input-label text-blue-700">目前年收入 (USD)</label><input type="text" id="annual_income" value="$80,000" oninput="handleCurrencyInput(this)"></div>
                            <div><label class="input-label text-blue-700">預計替代年數</label>
                                <select id="income_years" onchange="calculate()">
                                    <option value="5">5 年</option><option value="10" selected>10 年 (標準責任)</option><option value="15">15 年</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-emerald-50/30 p-4 rounded-xl">
                            <div><label class="input-label text-emerald-700">每位子女教育預算 (USD)</label><input type="text" id="edu_per_child" value="$150,000" oninput="handleCurrencyInput(this)"></div>
                            <div><label class="input-label text-emerald-700">子女數量</label><input type="text" id="child_count" value="2" oninput="calculate()"></div>
                        </div>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title text-orange-500 border-orange-500">02. 醫療與重疾應急金</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="input-label text-orange-600">醫療自付上限 (OOP Max x 2年)</label><input type="text" id="medical_oop" value="$18,000" oninput="handleCurrencyInput(this)"></div>
                        <div><label class="input-label text-orange-600">重疾康復生活費 (1-2年年薪)</label><input type="text" id="recovery_fund" value="$160,000" oninput="handleCurrencyInput(this)"></div>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title text-purple-600 border-purple-600">03. 長期照護路徑與方案選取</h2>
                    <div class="flex bg-slate-100 p-1 rounded-xl mb-6 gap-1">
                        <button id="btn_us" onclick="setLTCPath('US')" class="flex-1 py-2.5 rounded-lg font-bold text-xs bg-white shadow-sm text-blue-600 transition-all">美國在地照護 (US)</button>
                        <button id="btn_tw" onclick="setLTCPath('TW')" class="flex-1 py-2.5 rounded-lg font-bold text-xs text-slate-500 transition-all">返回台灣照護 (TW)</button>
                    </div>

                    <div class="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <label class="input-label text-blue-700">選擇預計照護時間長度 (月數)</label>
                        <select id="ltc_duration" onchange="calculate()">
                            <option value="12">12 個月</option><option value="24">24 個月</option>
                            <option value="36" selected>36 個月 (3 年 - 平均值)</option>
                            <option value="48">48 個月</option><option value="60">60 個月 (5 年)</option>
                        </select>
                    </div>

                    <div id="us_ltc_details" class="space-y-3">
                        <div class="ltc-option-card active" id="card_inhome" onclick="selectLtcType('inhome')">
                            <input type="radio" name="ltc_type" id="radio_inhome" value="inhome" checked class="w-4 h-4">
                            <div class="ml-4 flex-grow">
                                <label class="input-label">In-Home Care (居家照護/月)</label>
                                <input type="text" id="us_inhome" value="$5,529" class="bg-transparent border-b border-slate-200 py-1 font-bold text-slate-700 outline-none w-full" onclick="event.stopPropagation()" oninput="handleCurrencyInput(this)">
                            </div>
                        </div>
                        <div class="ltc-option-card" id="card_assisted" onclick="selectLtcType('assisted')">
                            <input type="radio" name="ltc_type" id="radio_assisted" value="assisted" class="w-4 h-4">
                            <div class="ml-4 flex-grow">
                                <label class="input-label">Assisted Living (輔助生活/月)</label>
                                <input type="text" id="us_assisted" value="$6,350" class="bg-transparent border-b border-slate-200 py-1 font-bold text-slate-700 outline-none w-full" onclick="event.stopPropagation()" oninput="handleCurrencyInput(this)">
                            </div>
                        </div>
                        <div class="ltc-option-card" id="card_nursing" onclick="selectLtcType('nursing')">
                            <input type="radio" name="ltc_type" id="radio_nursing" value="nursing" class="w-4 h-4">
                            <div class="ml-4 flex-grow">
                                <label class="input-label">Nursing Home Care (專業護理/月)</label>
                                <input type="text" id="us_nursing" value="$8,015" class="bg-transparent border-b border-slate-200 py-1 font-bold text-slate-700 outline-none w-full" onclick="event.stopPropagation()" oninput="handleCurrencyInput(this)">
                            </div>
                        </div>
                    </div>

                    <div id="tw_ltc_details" class="hidden">
                        <div class="ltc-option-card border-blue-500 bg-blue-50/50">
                            <div class="flex-grow">
                                <label class="input-label">台灣照護月費估算 (USD/月)</label>
                                <input type="text" id="tw_monthly" value="$3,500" class="bg-transparent border-b border-blue-200 py-1 font-bold text-slate-700 outline-none w-full" oninput="handleCurrencyInput(this)">
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title text-emerald-600 border-emerald-600">最後一步：現有資產與保障</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-emerald-50/30 p-4 rounded-xl">
                        <div>
                            <label class="input-label text-emerald-700">目前已有總保額 (USD)</label>
                            <input type="text" id="current_insurance" value="$300,000" oninput="handleCurrencyInput(this)" class="asset-input">
                        </div>
                        <div>
                            <label class="input-label text-emerald-700">流動性存款/投資 (USD)</label>
                            <input type="text" id="current_assets" value="$100,000" oninput="handleCurrencyInput(this)" class="asset-input">
                        </div>
                    </div>
                </section>
            </div>

            <div class="w-full lg:w-1/3 lg:sticky lg:top-8">
                <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
                    <div class="bg-blue-600 p-8 text-center text-white">
                        <h3 class="text-[10px] font-bold opacity-60 uppercase tracking-[0.2em] mb-2">保障缺口分析總覽</h3>
                        <div id="total_gap_val" class="text-4xl font-black tracking-tighter">$0</div>
                    </div>
                    <div class="p-8 space-y-6">
                        <div class="relative h-60 w-full mb-4">
                            <canvas id="gapChart"></canvas>
                        </div>
                        <div class="space-y-4">
                            <div class="flex justify-between items-center border-b border-slate-50 pb-3">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">身故保障需求</p>
                                <p id="life_need_display" class="text-lg font-bold text-red-600">$0</p>
                            </div>
                            <div class="flex justify-between items-center border-b border-slate-50 pb-3">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">生前福利需求</p>
                                <p id="medical_need_display" class="text-lg font-bold text-orange-500">$0</p>
                            </div>
                            <div class="flex justify-between items-center border-b border-slate-50 pb-3">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">長期照護預備</p>
                                <p id="ltc_need_display" class="text-lg font-bold text-purple-600">$0</p>
                            </div>
                        </div>
                        <div class="pt-4 space-y-3">
                            <button id="saveBtn" onclick="saveToSheet()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-black transition-all shadow-lg active:scale-95">儲存諮詢紀錄</button>
                            <button onclick="window.print()" class="w-full bg-slate-100 text-slate-500 font-bold py-3 rounded-xl text-xs hover:bg-slate-200">列印報告 PDF</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEsNTWhldPnUc1xxnUHJcaH14Wbd0J1CMSOnhI9r_5ckZ-jRwHEhPR1lZdptHe3H6o/exec";
        let globalRates = { US_LTC_Monthly: 8500, TW_LTC_Monthly: 3200 };
        let currentLTCPath = 'US';
        let myChart = null;

        function formatUSD(val) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0,
            }).format(val);
        }

        function parseCurrency(str) {
            return parseFloat(str.replace(/[$,]/g, '')) || 0;
        }

        function handleCurrencyInput(el) {
            let cursorPosition = el.selectionStart;
            let originalLength = el.value.length;
            let val = el.value.replace(/[^\d]/g, '');
            if (val === '') { el.value = ''; calculate(); return; }
            let formatted = formatUSD(parseInt(val, 10));
            el.value = formatted;
            let newLength = el.value.length;
            cursorPosition = cursorPosition + (newLength - originalLength);
            el.setSelectionRange(cursorPosition, cursorPosition);
            calculate();
        }

        window.onload = function() {
            document.getElementById('display_date').innerText = "報告日期：" + new Date().toLocaleDateString();
            initChart();
            calculate();
            fetch(SCRIPT_URL).then(res => res.json()).then(data => {
                globalRates = data;
                document.getElementById('tw_monthly').value = formatUSD(data.TW_LTC_Monthly);
                calculate();
            }).catch(e => calculate());
        };

        function setLTCPath(path) {
            currentLTCPath = path;
            document.getElementById('btn_us').className = (path === 'US') ? "flex-1 py-2.5 rounded-lg font-bold text-xs bg-white shadow-sm text-blue-600 transition-all" : "flex-1 py-2.5 rounded-lg font-bold text-xs text-slate-500 transition-all";
            document.getElementById('btn_tw').className = (path === 'TW') ? "flex-1 py-2.5 rounded-lg font-bold text-xs bg-white shadow-sm text-blue-600 transition-all" : "flex-1 py-2.5 rounded-lg font-bold text-xs text-slate-500 transition-all";
            document.getElementById('us_ltc_details').classList.toggle('hidden', path !== 'US');
            document.getElementById('tw_ltc_details').classList.toggle('hidden', path !== 'TW');
            calculate();
        }

        function selectLtcType(type) {
            document.getElementById('radio_' + type).checked = true;
            ['inhome', 'assisted', 'nursing'].forEach(t => {
                document.getElementById('card_' + t).className = (t === type) ? "ltc-option-card active border-blue-500 bg-blue-50/50 shadow-sm" : "ltc-option-card border-slate-200 bg-white";
            });
            calculate();
        }

        function calculate() {
            const mortgage = parseCurrency(document.getElementById('mortgage').value);
            const other_debt = parseCurrency(document.getElementById('other_debt').value);
            const annual = parseCurrency(document.getElementById('annual_income').value);
            const years = parseInt(document.getElementById('income_years').value) || 10;
            const edu = parseCurrency(document.getElementById('edu_per_child').value) * (parseFloat(document.getElementById('child_count').value) || 0);
            const lifeTotalNeed = mortgage + other_debt + (annual * years) + edu + 20000;
            const med = parseCurrency(document.getElementById('medical_oop').value) + parseCurrency(document.getElementById('recovery_fund').value);
            const duration = parseInt(document.getElementById('ltc_duration').value) || 36;
            let monthlyRate = 0;
            if(currentLTCPath === 'US') {
                const selectedType = document.querySelector('input[name="ltc_type"]:checked').value;
                monthlyRate = parseCurrency(document.getElementById('us_' + selectedType).value);
            } else {
                monthlyRate = parseCurrency(document.getElementById('tw_monthly').value);
            }
            const ltcTotalNeed = monthlyRate * duration;
            const ins = parseCurrency(document.getElementById('current_insurance').value);
            const asset = parseCurrency(document.getElementById('current_assets').value);
            const gap = Math.max(0, (lifeTotalNeed + med + ltcTotalNeed) - (ins + asset));

            document.getElementById('life_need_display').innerText = formatUSD(lifeTotalNeed);
            document.getElementById('medical_need_display').innerText = formatUSD(med);
            document.getElementById('ltc_need_display').innerText = formatUSD(ltcTotalNeed);
            document.getElementById('total_gap_val').innerText = formatUSD(gap);
            updateChart(lifeTotalNeed, med, ltcTotalNeed, ins, asset);
        }

        function initChart() {
            const ctx = document.getElementById('gapChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [
                        { data: [1, 1, 1], backgroundColor: ['#ef4444', '#f97316', '#a855f7'], borderWidth: 0, weight: 1.5 },
                        { data: [1, 1, 1], backgroundColor: ['#22c55e', '#bbf7d0', '#f1f5f9'], borderWidth: 0, weight: 1 }
                    ]
                },
                options: { cutout: '40%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function updateChart(life, med, ltc, ins, asset) {
            const total = life + med + ltc;
            const gap = Math.max(0, total - (ins + asset));
            myChart.data.datasets[0].data = [life, med, ltc];
            myChart.data.datasets[1].data = [ins, asset, gap];
            myChart.update();
        }

        async function saveToSheet() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = '同步中...'; btn.disabled = true;
            try {
                const payload = {
                    name: document.getElementById('client_name').value || "未命名",
                    totalGap: document.getElementById('total_gap_val').innerText,
                    notes: document.getElementById('notes').value
                };
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert('✅ 諮詢紀錄已成功同步。');
            } catch (e) { alert('儲存失敗'); }
            finally { btn.innerText = '儲存諮詢紀錄'; btn.disabled = false; }
        }
    </script>
</body>
</html>
