<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevatus 保障需求分析系統 v3.1 | Jimmy Chuang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        
        /* 統一卡片：白底、圓角、陰影、頂部彩色飾條 */
        .card { @apply bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-100 mb-6 transition-all hover:shadow-md relative overflow-hidden; }
        
        /* 卡片頂部彩色線條 */
        .card-accent-blue { @apply absolute top-0 left-0 w-full h-1.5 bg-blue-500; }
        .card-accent-orange { @apply absolute top-0 left-0 w-full h-1.5 bg-orange-500; }
        .card-accent-purple { @apply absolute top-0 left-0 w-full h-1.5 bg-purple-500; }
        .card-accent-green { @apply absolute top-0 left-0 w-full h-1.5 bg-emerald-500; }
        .card-accent-slate { @apply absolute top-0 left-0 w-full h-1.5 bg-slate-700; }
        
        /* 標題與標籤 */
        .section-title { @apply text-lg sm:text-xl font-black mb-6 text-slate-800 tracking-wide; }
        .input-label { @apply block text-slate-500 text-xs font-bold mb-1 uppercase tracking-widest; }
        
        /* v2.5 底線風格輸入框 */
        .input-line { 
            @apply w-full bg-transparent border-b-2 border-slate-200 py-1.5 text-slate-800 font-black text-lg sm:text-xl outline-none transition-colors;
        }
        .input-line:focus { @apply border-blue-500; }
        select.input-line { @apply pb-2 cursor-pointer; }
        
        /* 長照方案卡片 */
        .ltc-card { @apply flex items-center p-4 rounded-xl border-2 border-slate-100 transition-all cursor-pointer mb-3 bg-white; }
        .ltc-card.active { @apply border-purple-500 bg-purple-50/30 shadow-sm; }
    </style>
</head>
<body class="p-4 sm:p-6 lg:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight italic">ELEVATUS <span class="text-blue-600 not-italic text-xl sm:text-2xl ml-1">保障需求分析 | v3.1</span></h1>
                <p class="text-slate-500 font-bold text-[10px] sm:text-xs tracking-[0.2em] uppercase mt-1">Elevatus Business Consultants | 專業台美理財投資顧問</p>
            </div>
            <div class="bg-white px-5 py-3 rounded-xl border border-slate-200 shadow-sm w-full md:w-auto flex justify-between md:block items-center">
                <p class="text-sm sm:text-base font-black text-slate-800">顧問：Jimmy Chuang</p>
                <p id="display_date" class="text-[10px] text-slate-400 font-bold md:mt-1"></p>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-6 sm:gap-8 items-start">
            
            <div class="w-full lg:w-7/12 xl:w-2/3">
                
                <section class="card">
                    <div class="card-accent-slate"></div>
                    <h2 class="section-title">00. 客戶資訊</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div><label class="input-label">客戶姓名</label><input type="text" id="client_name" value="王先生" class="input-line text-base sm:text-lg font-bold"></div>
                        <div><label class="input-label">諮詢備註</label><input type="text" id="notes" value="一家四口" class="input-line text-base sm:text-lg font-bold"></div>
                    </div>
                </section>

                <section class="card">
                    <div class="card-accent-blue"></div>
                    <h2 class="section-title">01. 家庭責任與身故保障</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                        <div>
                            <label class="input-label text-blue-600">房屋貸款餘額 (USD)</label>
                            <input type="text" id="mortgage" value="$350,000" oninput="handleCurrencyInput(this)" class="input-line focus:border-blue-500">
                        </div>
                        <div>
                            <label class="input-label text-blue-600">目前年收入 (USD)</label>
                            <input type="text" id="annual_income" value="$80,000" oninput="handleCurrencyInput(this)" class="input-line focus:border-blue-500">
                        </div>
                        <div>
                            <label class="input-label text-blue-600">預計替代年數</label>
                            <select id="income_years" onchange="calculate()" class="input-line text-base focus:border-blue-500">
                                <option value="5">5年 (過渡緩衝)</option>
                                <option value="10" selected>10年 (標準責任)</option>
                                <option value="15">15年 (長期守護)</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="input-label text-blue-600">其他個人/商業貸款</label>
                            <input type="text" id="other_debt" value="$100,000" oninput="handleCurrencyInput(this)" class="input-line focus:border-blue-500">
                        </div>
                        <div>
                            <label class="input-label text-blue-600">每位子女教育預算</label>
                            <input type="text" id="edu_per_child" value="$150,000" oninput="handleCurrencyInput(this)" class="input-line focus:border-blue-500">
                        </div>
                        <div>
                            <label class="input-label text-blue-600">子女數量</label>
                            <input type="text" id="child_count" value="2" oninput="calculate()" class="input-line focus:border-blue-500">
                        </div>
                    </div>
                </section>

                <section class="card">
                    <div class="card-accent-orange"></div>
                    <h2 class="section-title">02. 醫療與重疾應急金</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                            <label class="input-label text-orange-600">醫療自付上限預留 (2年)</label>
                            <input type="text" id="medical_oop" value="$18,000" oninput="handleCurrencyInput(this)" class="input-line focus:border-orange-500">
                        </div>
                        <div>
                            <label class="input-label text-orange-600">重大疾病應急金 (生活費)</label>
                            <input type="text" id="recovery_fund" value="$100,000" oninput="handleCurrencyInput(this)" class="input-line focus:border-orange-500">
                        </div>
                    </div>
                </section>

                <section class="card">
                    <div class="card-accent-purple"></div>
                    <h2 class="section-title">03. 長照方案選擇</h2>
                    
                    <div class="flex bg-slate-50 p-1.5 rounded-xl mb-6 gap-1 border border-slate-100">
                        <button id="btn_us" onclick="setLTCPath('US')" class="flex-1 py-3 rounded-lg font-black text-sm bg-white shadow text-purple-700 transition-all">🇺🇸 美國在地照護</button>
                        <button id="btn_tw" onclick="setLTCPath('TW')" class="flex-1 py-3 rounded-lg font-bold text-sm text-slate-500 transition-all">🇹🇼 返回台灣照護</button>
                    </div>

                    <div class="mb-6">
                        <label class="input-label text-purple-600">預計需要照護的時間長度</label>
                        <select id="ltc_duration" onchange="calculate()" class="input-line text-base focus:border-purple-500">
                            <option value="12">12 個月</option><option value="24">24 個月</option>
                            <option value="36" selected>36 個月 (3 年 - 平均值)</option>
                            <option value="48">48 個月</option><option value="60">60 個月 (5 年)</option>
                        </select>
                    </div>

                    <div id="us_ltc_details" class="space-y-3">
                        <div class="ltc-card active" id="card_inhome" onclick="selectLtcType('inhome')">
                            <input type="radio" name="ltc_type" id="radio_inhome" value="inhome" checked class="w-5 h-5 ml-2">
                            <div class="ml-4 flex-grow pr-2">
                                <label class="text-[11px] font-bold text-slate-400 uppercase">In-Home Care (居家照護/月)</label>
                                <input type="text" id="us_inhome" value="$5,529" class="input-line focus:border-purple-500" onclick="event.stopPropagation()" oninput="handleCurrencyInput(this)">
                            </div>
                        </div>
                        <div class="ltc-card" id="card_assisted" onclick="selectLtcType('assisted')">
                            <input type="radio" name="ltc_type" id="radio_assisted" value="assisted" class="w-5 h-5 ml-2">
                            <div class="ml-4 flex-grow pr-2">
                                <label class="text-[11px] font-bold text-slate-400 uppercase">Assisted Living (輔助生活/月)</label>
                                <input type="text" id="us_assisted" value="$6,350" class="input-line focus:border-purple-500" onclick="event.stopPropagation()" oninput="handleCurrencyInput(this)">
                            </div>
                        </div>
                        <div class="ltc-card" id="card_nursing" onclick="selectLtcType('nursing')">
                            <input type="radio" name="ltc_type" id="radio_nursing" value="nursing" class="w-5 h-5 ml-2">
                            <div class="ml-4 flex-grow pr-2">
                                <label class="text-[11px] font-bold text-slate-400 uppercase">Nursing Home (專業護理/月)</label>
                                <input type="text" id="us_nursing" value="$8,015" class="input-line focus:border-purple-500" onclick="event.stopPropagation()" oninput="handleCurrencyInput(this)">
                            </div>
                        </div>
                    </div>

                    <div id="tw_ltc_details" class="hidden">
                        <div class="ltc-card active">
                            <div class="flex-grow px-3">
                                <label class="text-xs font-bold text-purple-600 uppercase">台灣照護月費估算 (USD/月)</label>
                                <input type="text" id="tw_monthly" value="$3,200" class="input-line text-purple-900 border-purple-200 focus:border-purple-500" oninput="handleCurrencyInput(this)">
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card">
                    <div class="card-accent-green"></div>
                    <h2 class="section-title">04. 現有資產與保障</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                            <label class="input-label text-emerald-600">目前已有總保額 (USD)</label>
                            <input type="text" id="current_insurance" value="$300,000" oninput="handleCurrencyInput(this)" class="input-line focus:border-emerald-500">
                        </div>
                        <div>
                            <label class="input-label text-emerald-600">流動性存款/投資 (USD)</label>
                            <input type="text" id="current_assets" value="$100,000" oninput="handleCurrencyInput(this)" class="input-line focus:border-emerald-500">
                        </div>
                    </div>
                </section>
            </div>

            <div class="w-full lg:w-5/12 xl:w-1/3 lg:sticky lg:top-8">
                <div class="bg-blue-600 rounded-[2rem] shadow-xl overflow-hidden border border-blue-700">
                    <div class="p-6 sm:p-8 text-center text-white">
                        <h3 class="text-sm font-bold opacity-80 uppercase tracking-[0.2em] mb-2">Results</h3>
                        <div class="relative h-48 sm:h-56 w-full mb-6 mt-4">
                            <canvas id="gapChart"></canvas>
                        </div>
                        
                        <div class="space-y-4 mb-6 text-left">
                            <div class="flex justify-between items-center border-b border-blue-500/50 pb-3">
                                <p class="text-xs font-bold text-blue-100 uppercase tracking-widest">身故保障缺口</p>
                                <p id="life_need_display" class="text-lg font-black text-white">$0</p>
                            </div>
                            <div class="flex justify-between items-center border-b border-blue-500/50 pb-3">
                                <p class="text-xs font-bold text-blue-100 uppercase tracking-widest">生前福利缺口</p>
                                <p id="medical_need_display" class="text-lg font-black text-white">$0</p>
                            </div>
                            <div class="flex justify-between items-center border-b border-blue-500/50 pb-3">
                                <p class="text-xs font-bold text-blue-100 uppercase tracking-widest">長期照護缺口</p>
                                <p id="ltc_need_display" class="text-lg font-black text-white">$0</p>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl p-6 text-center shadow-inner mb-6">
                            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Total Gap</p>
                            <div id="total_gap_val" class="text-4xl font-black tracking-tighter text-red-600">$0</div>
                        </div>

                        <div class="space-y-3">
                            <button id="saveBtn" onclick="saveToSheet()" class="w-full bg-slate-900 text-white font-black py-3.5 rounded-xl hover:bg-black transition-all shadow-lg active:scale-95 text-sm tracking-wide flex items-center justify-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                                儲存諮詢紀錄
                            </button>
                            <button onclick="window.print()" class="w-full bg-blue-500 text-white font-bold py-3.5 rounded-xl text-sm hover:bg-blue-400 transition-all flex items-center justify-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                                列印 PDF 報告
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEsNTWhldPnUc1xxnUHJcaH14Wbd0J1CMSOnhI9r_5ckZ-jRwHEhPR1lZdptHe3H6o/exec";
        let globalRates = { US_LTC_Monthly: 8500, TW_LTC_Monthly: 3200 };
        let currentLTCPath = 'US';
        let myChart = null;

        function formatUSD(val) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0,
            }).format(val);
        }

        function parseCurrency(str) {
            return parseFloat(str.replace(/[$,]/g, '')) || 0;
        }

        function handleCurrencyInput(el) {
            let cursorPosition = el.selectionStart;
            let originalLength = el.value.length;
            let val = el.value.replace(/[^\d]/g, '');
            if (val === '') { el.value = ''; calculate(); return; }
            let formatted = formatUSD(parseInt(val, 10));
            el.value = formatted;
            let newLength = el.value.length;
            cursorPosition = cursorPosition + (newLength - originalLength);
            el.setSelectionRange(cursorPosition, cursorPosition);
            calculate();
        }

        window.onload = function() {
            document.getElementById('display_date').innerText = new Date().toLocaleDateString();
            initChart();
            calculate();
            fetch(SCRIPT_URL).then(res => res.json()).then(data => {
                globalRates = data;
                document.getElementById('tw_monthly').value = formatUSD(data.TW_LTC_Monthly);
                calculate();
            }).catch(e => calculate());
        };

        function setLTCPath(path) {
            currentLTCPath = path;
            const btnUs = document.getElementById('btn_us');
            const btnTw = document.getElementById('btn_tw');
            
            if(path === 'US') {
                btnUs.className = "flex-1 py-3 rounded-lg font-black text-sm bg-white shadow text-purple-700 transition-all";
                btnTw.className = "flex-1 py-3 rounded-lg font-bold text-sm text-slate-500 transition-all";
                document.getElementById('us_ltc_details').classList.remove('hidden');
                document.getElementById('tw_ltc_details').classList.add('hidden');
            } else {
                btnTw.className = "flex-1 py-3 rounded-lg font-black text-sm bg-white shadow text-purple-700 transition-all";
                btnUs.className = "flex-1 py-3 rounded-lg font-bold text-sm text-slate-500 transition-all";
                document.getElementById('us_ltc_details').classList.add('hidden');
                document.getElementById('tw_ltc_details').classList.remove('hidden');
            }
            calculate();
        }

        function selectLtcType(type) {
            document.getElementById('radio_' + type).checked = true;
            ['inhome', 'assisted', 'nursing'].forEach(t => {
                const card = document.getElementById('card_' + t);
                if(t === type) card.className = "ltc-card active border-purple-500 bg-purple-50/30 shadow-sm";
                else card.className = "ltc-card border-slate-100 bg-white";
            });
            calculate();
        }

        function calculate() {
            const mortgage = parseCurrency(document.getElementById('mortgage').value);
            const other_debt = parseCurrency(document.getElementById('other_debt').value);
            const annual = parseCurrency(document.getElementById('annual_income').value);
            const years = parseInt(document.getElementById('income_years').value) || 10;
            const edu = parseCurrency(document.getElementById('edu_per_child').value) * (parseFloat(document.getElementById('child_count').value) || 0);
            
            const lifeTotalNeed = mortgage + other_debt + (annual * years) + edu + 20000;
            const med = parseCurrency(document.getElementById('medical_oop').value) + parseCurrency(document.getElementById('recovery_fund').value);
            const duration = parseInt(document.getElementById('ltc_duration').value) || 36;
            
            let monthlyRate = 0;
            if(currentLTCPath === 'US') {
                const selectedType = document.querySelector('input[name="ltc_type"]:checked').value;
                monthlyRate = parseCurrency(document.getElementById('us_' + selectedType).value);
            } else {
                monthlyRate = parseCurrency(document.getElementById('tw_monthly').value);
            }
            const ltcTotalNeed = monthlyRate * duration;
            
            const ins = parseCurrency(document.getElementById('current_insurance').value);
            const asset = parseCurrency(document.getElementById('current_assets').value);
            const gap = Math.max(0, (lifeTotalNeed + med + ltcTotalNeed) - (ins + asset));

            document.getElementById('life_need_display').innerText = formatUSD(lifeTotalNeed);
            document.getElementById('medical_need_display').innerText = formatUSD(med);
            document.getElementById('ltc_need_display').innerText = formatUSD(ltcTotalNeed);
            document.getElementById('total_gap_val').innerText = formatUSD(gap);
            
            updateChart(lifeTotalNeed, med, ltcTotalNeed, ins, asset);
        }

        function initChart() {
            const ctx = document.getElementById('gapChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [
                        { data: [1, 1, 1], backgroundColor: ['#60a5fa', '#fb923c', '#c084fc'], borderWidth: 0, weight: 1.5 },
                        { data: [1, 1, 1], backgroundColor: ['#f8fafc', '#e2e8f0', '#cbd5e1'], borderWidth: 0, weight: 1 }
                    ]
                },
                options: { cutout: '50%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function updateChart(life, med, ltc, ins, asset) {
            const total = life + med + ltc;
            const gap = Math.max(0, total - (ins + asset));
            myChart.data.datasets[0].data = [life, med, ltc];
            myChart.data.datasets[1].data = [ins, asset, gap];
            myChart.update();
        }

        async function saveToSheet() {
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '同步中...'; btn.disabled = true;
            try {
                const payload = {
                    name: document.getElementById('client_name').value || "未命名",
                    totalGap: document.getElementById('total_gap_val').innerText,
                    notes: document.getElementById('notes').value
                };
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert('✅ 諮詢紀錄已成功同步。');
            } catch (e) { alert('儲存失敗'); }
            finally { 
                btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>儲存諮詢紀錄'; 
                btn.disabled = false; 
            }
        }
    </script>
</body>
</html>
