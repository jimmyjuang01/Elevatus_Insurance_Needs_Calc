<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevatus 保障需求分析系統 v2.7 | Jimmy Chuang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        
        /* 統一卡片外觀 */
        .card { @apply bg-white p-5 sm:p-7 rounded-2xl sm:rounded-[2rem] border border-slate-100 shadow-sm mb-6 sm:mb-8 transition-all; }
        
        /* 統一標題與標籤 */
        .section-title { @apply text-lg sm:text-xl font-black mb-6 flex items-center text-slate-800 border-l-4 pl-3 sm:pl-4 tracking-wide; }
        .input-label { @apply block text-slate-400 text-[11px] font-bold mb-2 uppercase tracking-wider; }
        
        /* 統一輸入框樣式 (包含高度、顏色、動畫) */
        .input-field { 
            @apply w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-800 font-bold text-sm sm:text-base transition-all outline-none;
        }
        .input-field:focus { @apply bg-white border-blue-500 ring-4 ring-blue-50; }
        
        /* 長照方案選取卡片 */
        .ltc-card { @apply flex items-center p-3 sm:p-4 rounded-xl border-2 transition-all cursor-pointer mb-3 bg-white; }
        .ltc-card.active { @apply border-blue-500 bg-blue-50 shadow-sm; }
        
        /* 綠色資產區塊專屬 */
        .asset-input { @apply bg-[#022c22] border-none text-white focus:ring-2 focus:ring-emerald-500; }
        
        /* 隱藏原生滾動條但可滾動 (美化) */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 sm:p-6 lg:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 sm:mb-10 gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight italic">ELEVATUS <span class="text-blue-600 not-italic text-xl sm:text-2xl ml-1">保障需求分析</span></h1>
                <p class="text-slate-400 font-bold text-[10px] sm:text-xs tracking-[0.2em] uppercase mt-1">Professional Cross-Border Financial Consulting</p>
            </div>
            <div class="bg-white px-5 py-3 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm w-full md:w-auto flex justify-between md:block items-center">
                <p class="text-sm font-black text-slate-800">顧問：Jimmy Chuang</p>
                <p id="display_date" class="text-[10px] text-slate-400 font-bold md:mt-1"></p>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-6 sm:gap-8 items-start">
            
            <div class="w-full lg:w-7/12 xl:w-2/3">
                
                <section class="card">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
                        <div><label class="input-label">客戶姓名 / 案件代號</label><input type="text" id="client_name" value="王先生" class="input-field"></div>
                        <div><label class="input-label">諮詢備註</label><input type="text" id="notes" value="一家四口" class="input-field"></div>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title border-red-500">01. 家庭責任與身故保障</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6 mb-4">
                        <div><label class="input-label text-red-500">房屋貸款餘額 (USD)</label><input type="text" id="mortgage" value="$350,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label text-red-500">其他個人/商業貸款</label><input type="text" id="other_debt" value="$100,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6 mb-4">
                        <div><label class="input-label text-blue-500">目前年收入 (USD)</label><input type="text" id="annual_income" value="$80,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label text-blue-500">預計替代年數</label>
                            <select id="income_years" onchange="calculate()" class="input-field">
                                <option value="5">5 年</option><option value="10" selected>10 年 (標準)</option><option value="15">15 年</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
                        <div><label class="input-label text-emerald-500">每位子女教育預算</label><input type="text" id="edu_per_child" value="$150,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label text-emerald-500">子女數量</label><input type="text" id="child_count" value="2" oninput="calculate()" class="input-field"></div>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title border-orange-400">02. 醫療與重疾應急金</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
                        <div><label class="input-label text-orange-500">醫療自付上限 (OOP Max x 2年)</label><input type="text" id="medical_oop" value="$18,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label text-orange-500">重疾康復生活費 (1-2年年薪)</label><input type="text" id="recovery_fund" value="$160,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title border-purple-500">03. 長期照護路徑與方案選取</h2>
                    
                    <div class="flex bg-slate-100 p-1.5 rounded-xl mb-6 gap-1">
                        <button id="btn_us" onclick="setLTCPath('US')" class="flex-1 py-2.5 sm:py-3 rounded-lg font-black text-xs sm:text-sm bg-white shadow text-blue-600 transition-all">美國在地照護 (US)</button>
                        <button id="btn_tw" onclick="setLTCPath('TW')" class="flex-1 py-2.5 sm:py-3 rounded-lg font-bold text-xs sm:text-sm text-slate-500 transition-all">返回台灣照護 (TW)</button>
                    </div>

                    <div class="mb-6">
                        <label class="input-label text-purple-600">選擇預計照護時間長度 (月數)</label>
                        <select id="ltc_duration" onchange="calculate()" class="input-field">
                            <option value="12">12 個月</option><option value="24">24 個月</option>
                            <option value="36" selected>36 個月 (3 年 - 平均值)</option>
                            <option value="48">48 個月</option><option value="60">60 個月 (5 年)</option>
                        </select>
                    </div>

                    <div id="us_ltc_details" class="space-y-3">
                        <div class="ltc-card active" id="card_inhome" onclick="selectLtcType('inhome')">
                            <input type="radio" name="ltc_type" id="radio_inhome" value="inhome" checked class="w-4 h-4 ml-2">
                            <div class="ml-4 flex-grow pr-2">
                                <label class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase">In-Home Care (居家照護/月)</label>
                                <input type="text" id="us_inhome" value="$5,529" class="bg-transparent border-b-2 border-slate-200 py-1 font-black text-slate-800 outline-none w-full text-base sm:text-lg focus:border-blue-500 transition-colors" onclick="event.stopPropagation()" oninput="handleCurrencyInput(this)">
                            </div>
                        </div>
                        <div class="ltc-card border-slate-200" id="card_assisted" onclick="selectLtcType('assisted')">
                            <input type="radio" name="ltc_type" id="radio_assisted" value="assisted" class="w-4 h-4 ml-2">
                            <div class="ml-4 flex-grow pr-2">
                                <label class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase">Assisted Living (輔助生活/月)</label>
                                <input type="text" id="us_assisted" value="$6,350" class="bg-transparent border-b-2 border-slate-200 py-1 font-black text-slate-800 outline-none w-full text-base sm:text-lg focus:border-blue-500 transition-colors" onclick="event.stopPropagation()" oninput="handleCurrencyInput(this)">
                            </div>
                        </div>
                        <div class="ltc-card border-slate-200" id="card_nursing" onclick="selectLtcType('nursing')">
                            <input type="radio" name="ltc_type" id="radio_nursing" value="nursing" class="w-4 h-4 ml-2">
                            <div class="ml-4 flex-grow pr-2">
                                <label class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase">Nursing Home (專業護理/月)</label>
                                <input type="text" id="us_nursing" value="$8,015" class="bg-transparent border-b-2 border-slate-200 py-1 font-black text-slate-800 outline-none w-full text-base sm:text-lg focus:border-blue-500 transition-colors" onclick="event.stopPropagation()" oninput="handleCurrencyInput(this)">
                            </div>
                        </div>
                    </div>

                    <div id="tw_ltc_details" class="hidden">
                        <div class="ltc-card active">
                            <div class="flex-grow px-2">
                                <label class="text-xs font-bold text-blue-600 uppercase">台灣照護月費估算 (USD/月)</label>
                                <input type="text" id="tw_monthly" value="$3,200" class="bg-transparent border-b-2 border-blue-200 py-1 mt-1 font-black text-blue-800 outline-none w-full text-lg sm:text-xl focus:border-blue-600 transition-colors" oninput="handleCurrencyInput(this)">
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card bg-[#064e3b] border-none shadow-xl sm:mb-0">
                    <h2 class="text-lg sm:text-xl font-black mb-6 flex items-center text-emerald-400">最後一步：現有資產與保障</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
                        <div>
                            <label class="input-label text-emerald-500">目前已有總保額 (USD)</label>
                            <input type="text" id="current_insurance" value="$300,000" oninput="handleCurrencyInput(this)" class="input-field asset-input">
                        </div>
                        <div>
                            <label class="input-label text-emerald-500">流動性存款/投資 (USD)</label>
                            <input type="text" id="current_assets" value="$100,000" oninput="handleCurrencyInput(this)" class="input-field asset-input">
                        </div>
                    </div>
                </section>
            </div>

            <div class="w-full lg:w-5/12 xl:w-1/3 lg:sticky lg:top-8">
                <div class="bg-white rounded-[2rem] sm:rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
                    <div class="bg-blue-600 p-6 sm:p-8 text-center text-white">
                        <h3 class="text-[10px] font-bold opacity-70 uppercase tracking-[0.2em] mb-2">保障缺口分析總覽</h3>
                        <div id="total_gap_val" class="text-4xl sm:text-5xl font-black tracking-tighter">$0</div>
                    </div>
                    <div class="p-6 sm:p-8 space-y-6">
                        <div class="relative h-48 sm:h-56 lg:h-64 w-full mb-2">
                            <canvas id="gapChart"></canvas>
                        </div>
                        <div class="space-y-4">
                            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                                <p class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest">身故保障需求</p>
                                <p id="life_need_display" class="text-base sm:text-lg font-black text-red-500">$0</p>
                            </div>
                            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                                <p class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest">生前福利需求</p>
                                <p id="medical_need_display" class="text-base sm:text-lg font-black text-orange-500">$0</p>
                            </div>
                            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                                <p class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest">長期照護預備</p>
                                <p id="ltc_need_display" class="text-base sm:text-lg font-black text-purple-600">$0</p>
                            </div>
                        </div>
                        <div class="pt-4 space-y-3">
                            <button id="saveBtn" onclick="saveToSheet()" class="w-full bg-slate-900 text-white font-black py-3.5 sm:py-4 rounded-xl hover:bg-black transition-all shadow-lg active:scale-95 text-sm sm:text-base">儲存諮詢紀錄</button>
                            <button onclick="window.print()" class="w-full bg-slate-50 text-slate-600 font-bold py-3 rounded-xl text-xs sm:text-sm hover:bg-slate-100 transition-all border border-slate-200">列印報告 PDF</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEsNTWhldPnUc1xxnUHJcaH14Wbd0J1CMSOnhI9r_5ckZ-jRwHEhPR1lZdptHe3H6o/exec";
        let globalRates = { US_LTC_Monthly: 8500, TW_LTC_Monthly: 3200 };
        let currentLTCPath = 'US';
        let myChart = null;

        function formatUSD(val) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0,
            }).format(val);
        }

        function parseCurrency(str) {
            return parseFloat(str.replace(/[$,]/g, '')) || 0;
        }

        function handleCurrencyInput(el) {
            let cursorPosition = el.
