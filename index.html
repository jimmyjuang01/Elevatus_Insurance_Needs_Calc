<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevatus 保障需求分析系統 v2.3 | Jimmy Chuang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .card { background: white; padding: 1.5rem; border-radius: 1.5rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 1.5rem; }
        .input-label { display: block; color: #64748b; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.25rem; text-transform: uppercase; }
        input[type="number"], input[type="text"], select { 
            width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0.6rem 1rem; color: #334155; transition: all 0.2s;
        }
        input:focus { @apply border-blue-500 ring-2 ring-blue-100 outline-none; }
        .section-title { font-size: 1.25rem; font-weight: 900; margin-bottom: 1.25rem; display: flex; align-items: center; color: #1e293b; border-left: 5px solid #2563eb; padding-left: 0.75rem; }
        .ltc-option-card { @apply flex items-center p-4 rounded-xl border-2 transition-all cursor-pointer mb-3; }
        .ltc-option-card.active { @apply border-blue-600 bg-blue-50; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">保障需求分析系統 <span class="text-blue-600">v2.3</span></h1>
                <p class="text-slate-500 font-medium text-sm text-center md:text-left">Elevatus Business Consultants | 專業跨境財務諮詢</p>
            </div>
            <div class="bg-white px-6 py-3 rounded-2xl border border-slate-100 text-right shadow-sm">
                <p class="text-sm font-bold text-slate-800">顧問：Jimmy Chuang</p>
                <p id="display_date" class="text-xs text-slate-400"></p>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8 items-start">
            
            <div class="w-full lg:w-2/3">
                <section class="card">
                    <h2 class="section-title text-red-600 border-red-600">01. 家庭責任與身故保障</h2>
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-red-50/50 p-4 rounded-xl">
                            <div><label class="input-label">房屋貸款餘額 (USD)</label><input type="number" id="mortgage" value="350000" oninput="calculate()"></div>
                            <div><label class="input-label">其他個人/商業貸款</label><input type="number" id="other_debt" value="100000" oninput="calculate()"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-blue-50/50 p-4 rounded-xl">
                            <div><label class="input-label">目前年收入 (USD)</label><input type="number" id="annual_income" value="80000" oninput="calculate()"></div>
                            <div><label class="input-label">預計替代年數</label>
                                <select id="income_years" onchange="calculate()">
                                    <option value="5">5 年</option><option value="10" selected>10 年</option><option value="15">15 年</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-emerald-50/50 p-4 rounded-xl">
                            <div><label class="input-label">每位子女教育預算</label><input type="number" id="edu_per_child" value="150000" oninput="calculate()"></div>
                            <div><label class="input-label">子女數量</label><input type="number" id="child_count" value="2" oninput="calculate()"></div>
                        </div>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title text-orange-500 border-orange-500">02. 醫療與重疾應急金</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="input-label">醫療自付上限 (OOP Max x 2年)</label><input type="number" id="medical_oop" value="18000" oninput="calculate()"></div>
                        <div><label class="input-label">重疾康復生活費 (1-2年年薪)</label><input type="number" id="recovery_fund" value="160000" oninput="calculate()"></div>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title text-purple-600 border-purple-600">03. 長期照護路徑與方案選取</h2>
                    
                    <div class="flex bg-slate-100 p-1 rounded-xl mb-6 gap-1">
                        <button id="btn_us" onclick="setLTCPath('US')" class="flex-1 py-3 rounded-lg font-bold text-sm bg-white shadow-sm text-blue-600 transition-all">美國在地照護 (US)</button>
                        <button id="btn_tw" onclick="setLTCPath('TW')" class="flex-1 py-3 rounded-lg font-bold text-sm text-slate-500 transition-all">返回台灣照護 (TW)</button>
                    </div>

                    <div class="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <label class="input-label text-blue-700">選擇預計需要照護的時間長度 (月數)</label>
                        <select id="ltc_duration" onchange="calculate()" class="mt-2 text-lg font-bold">
                            <option value="12">12 個月 (1 年)</option>
                            <option value="24">24 個月 (2 年)</option>
                            <option value="36" selected>36 個月 (3 年 - 平均值)</option>
                            <option value="48">48 個月 (4 年)</option>
                            <option value="60">60 個月 (5 年 - 完整保障)</option>
                        </select>
                    </div>

                    <div id="us_ltc_details" class="space-y-3">
                        <div class="flex justify-between items-center mb-4 px-2">
                            <span class="text-xs font-bold text-slate-400 italic">點擊右側按鈕查詢各州最新數據 ➔</span>
                            <a href="https://www.carescout.com/cost-of-care" target="_blank" class="text-[10px] bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-bold">CareScout 數據工具</a>
                        </div>
                        <div class="ltc-option-card border-blue-600 bg-blue-50" id="card_inhome" onclick="selectLtcType('inhome')">
                            <input type="radio" name="ltc_type" id="radio_inhome" value="inhome" checked class="w-5 h-5">
                            <div class="ml-4 flex-grow">
                                <label class="input-label">In-Home Care (居家照護/月)</label>
                                <input type="number" id="us_inhome" value="5529" class="bg-transparent border-b border-slate-300 py-1" onclick="event.stopPropagation()" oninput="calculate()">
                            </div>
                        </div>
                        <div class="ltc-option-card border-slate-200" id="card_assisted" onclick="selectLtcType('assisted')">
                            <input type="radio" name="ltc_type" id="radio_assisted" value="assisted" class="w-5 h-5">
                            <div class="ml-4 flex-grow">
                                <label class="input-label">Assisted Living (輔助生活機構/月)</label>
                                <input type="number" id="us_assisted" value="6350" class="bg-transparent border-b border-slate-300 py-1" onclick="event.stopPropagation()" oninput="calculate()">
                            </div>
                        </div>
                        <div class="ltc-option-card border-slate-200" id="card_nursing" onclick="selectLtcType('nursing')">
                            <input type="radio" name="ltc_type" id="radio_nursing" value="nursing" class="w-5 h-5">
                            <div class="ml-4 flex-grow">
                                <label class="input-label">Nursing Home Care (專業護理機構/月)</label>
                                <input type="number" id="us_nursing" value="8015" class="bg-transparent border-b border-slate-300 py-1" onclick="event.stopPropagation()" oninput="calculate()">
                            </div>
                        </div>
                    </div>

                    <div id="tw_ltc_details" class="hidden">
                        <div class="ltc-option-card border-blue-600 bg-blue-50">
                            <div class="flex-grow">
                                <label class="input-label">台灣照護月費估算 (可手動調整)</label>
                                <div class="flex items-baseline gap-2 mt-1">
                                    <span class="text-2xl font-black text-blue-700">$</span>
                                    <input type="number" id="tw_monthly" value="3200" class="bg-transparent border-b border-blue-300 text-2xl font-black text-blue-700 w-40 focus:outline-none" oninput="calculate()">
                                    <span class="text-sm font-bold text-slate-400">/ Month</span>
                                </div>
                                <p class="text-[10px] text-slate-400 mt-2 italic">* 預設包含外籍看護及生活材料雜費，或一般養護機構費用。</p>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card bg-slate-900 text-white shadow-2xl">
                    <h2 class="text-lg font-bold mb-4 flex items-center font-black tracking-widest text-blue-400">最後一步：扣除已擁有的資產</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="input-label text-slate-400">目前已有總保額 (USD)</label><input type="number" id="current_insurance" value="300000" oninput="calculate()" class="bg-slate-800 border-none text-white focus:ring-2 focus:ring-blue-500"></div>
                        <div><label class="input-label text-slate-400">流動性存款/投資 (USD)</label><input type="number" id="current_assets" value="100000" oninput="calculate()" class="bg-slate-800 border-none text-white focus:ring-2 focus:ring-blue-500"></div>
                    </div>
                </section>
            </div>

            <div class="w-full lg:w-1/3 lg:sticky lg:top-8">
                <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
                    <div class="bg-blue-600 p-8 text-center text-white">
                        <h3 class="text-xs font-bold opacity-60 uppercase tracking-[0.2em] mb-2 font-black">保障缺口分析總覽</h3>
                        <div id="total_gap_val" class="text-5xl font-black tracking-tighter">$0</div>
                    </div>
                    <div class="p-8 space-y-6">
                        <div class="relative h-60 w-full mb-4">
                            <canvas id="gapChart"></canvas>
                        </div>
                        <div class="space-y-4">
                            <div class="flex justify-between items-center border-b pb-3">
                                <p class="text-xs font-bold text-slate-400 uppercase">身故保障需求</p>
                                <p id="life_need_display" class="text-xl font-bold text-red-600">$0</p>
                            </div>
                            <div class="flex justify-between items-center border-b pb-3">
                                <p class="text-xs font-bold text-slate-400 uppercase">生前福利需求</p>
                                <p id="medical_need_display" class="text-xl font-bold text-orange-500">$0</p>
                            </div>
                            <div class="flex justify-between items-center border-b pb-3">
                                <p class="text-xs font-bold text-slate-400 uppercase">長期照護預備</p>
                                <p id="ltc_need_display" class="text-xl font-bold text-purple-600">$0</p>
                            </div>
                        </div>
                        <div class="pt-4 space-y-3">
                            <button id="saveBtn" onclick="saveToSheet()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-black transition-all shadow-lg">儲存諮詢紀錄</button>
                            <button onclick="window.print()" class="w-full bg-slate-100 text-slate-500 font-bold py-3 rounded-xl text-sm">列印報告 PDF</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEsNTWhldPnUc1xxnUHJcaH14Wbd0J1CMSOnhI9r_5ckZ-jRwHEhPR1lZdptHe3H6o/exec";
        let globalRates = { US_LTC_Monthly: 8500, TW_LTC_Monthly: 3200 };
        let currentLTCPath = 'US';
        let myChart = null;

        window.onload = function() {
            document.getElementById('display_date').innerText = "諮詢日期：" + new Date().toLocaleDateString();
            initChart();
            calculate();
            fetch(SCRIPT_URL).then(res => res.json()).then(data => {
                globalRates = data;
                // 將 Google Sheet 的預設值填入台灣輸入框
                document.getElementById('tw_monthly').value = data.TW_LTC_Monthly;
                calculate();
            }).catch(e => calculate());
        };

        function setLTCPath(path) {
            currentLTCPath = path;
            const btnUs = document.getElementById('btn_us');
            const btnTw = document.getElementById('btn_tw');
            const usDetails = document.getElementById('us_ltc_details');
            const twDetails = document.getElementById('tw_ltc_details');

            if(path === 'US') {
                btnUs.className = "flex-1 py-3 rounded-lg font-bold text-sm bg-white shadow-sm text-blue-600";
                btnTw.className = "flex-1 py-3 rounded-lg font-bold text-sm text-slate-500";
                usDetails.classList.remove('hidden');
                twDetails.classList.add('hidden');
            } else {
                btnTw.className = "flex-1 py-3 rounded-lg font-bold text-sm bg-white shadow-sm text-blue-600";
                btnUs.className = "flex-1 py-3 rounded-lg font-bold text-sm text-slate-500";
                usDetails.classList.add('hidden');
                twDetails.classList.remove('hidden');
            }
            calculate();
        }

        function selectLtcType(type) {
            document.getElementById('radio_' + type).checked = true;
            ['inhome', 'assisted', 'nursing'].forEach(t => {
                const card = document.getElementById('card_' + t);
                if(t === type) card.classList.add('active', 'border-blue-600', 'bg-blue-50');
                else card.classList.remove('active', 'border-blue-600', 'bg-blue-50');
            });
            calculate();
        }

        function calculate() {
            const mortgage = parseFloat(document.getElementById('mortgage').value) || 0;
            const other_debt = parseFloat(document.getElementById('other_debt').value) || 0;
            const annual = parseFloat(document.getElementById('annual_income').value) || 0;
            const years = parseInt(document.getElementById('income_years').value) || 10;
            const edu = (parseFloat(document.getElementById('edu_per_child').value) || 0) * (parseInt(document.getElementById('child_count').value) || 0);
            const lifeTotalNeed = mortgage + other_debt + (annual * years) + edu + 20000;

            const med = (parseFloat(document.getElementById('medical_oop').value) || 0) + (parseFloat(document.getElementById('recovery_fund').value) || 0);
            
            // 長照計算邏輯
            const duration = parseInt(document.getElementById('ltc_duration').value) || 36;
            let monthlyRate = 0;
            if(currentLTCPath === 'US') {
                const selectedType = document.querySelector('input[name="ltc_type"]:checked').value;
                monthlyRate = parseFloat(document.getElementById('us_' + selectedType).value) || 0;
            } else {
                // 抓取台灣手動輸入框的數值
                monthlyRate = parseFloat(document.getElementById('tw_monthly').value) || 0;
            }
            const ltcTotalNeed = monthlyRate * duration;

            const ins = parseFloat(document.getElementById('current_insurance').value) || 0;
            const asset = parseFloat(document.getElementById('current_assets').value) || 0;
            const gap = Math.max(0, (lifeTotalNeed + med + ltcTotalNeed) - (ins + asset));

            document.getElementById('life_need_display').innerText = '$' + Math.round(lifeTotalNeed).toLocaleString();
            document.getElementById('medical_need_display').innerText = '$' + Math.round(med).toLocaleString();
            document.getElementById('ltc_need_display').innerText = '$' + Math.round(ltcTotalNeed).toLocaleString();
            document.getElementById('total_gap_val').innerText = '$' + Math.round(gap).toLocaleString();

            updateChart(lifeTotalNeed, med, ltcTotalNeed, ins, asset);
        }

        function initChart() {
            const ctx = document.getElementById('gapChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [
                        { data: [1, 1, 1], backgroundColor: ['#ef4444', '#f97316', '#a855f7'], borderWidth: 0, weight: 1.5 },
                        { data: [1, 1, 1], backgroundColor: ['#22c55e', '#bbf7d0', '#f1f5f9'], borderWidth: 0, weight: 1 }
                    ]
                },
                options: { cutout: '40%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function updateChart(life, med, ltc, ins, asset) {
            const gap = Math.max(0, (life + med + ltc) - (ins + asset));
            myChart.data.datasets[0].data = [life, med, ltc];
            myChart.data.datasets[1].data = [ins, asset, gap];
            myChart.update();
        }

        async function saveToSheet() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = '同步中...'; btn.disabled = true;
            try {
                const payload = {
                    name: document.getElementById('client_name').value || "未命名",
                    ltcPath: currentLTCPath,
                    ltcMonthly: (currentLTCPath === 'US') ? document.querySelector('input[name="ltc_type"]:checked').value : document.getElementById('tw_monthly').value,
                    ltcDuration: document.getElementById('ltc_duration').value,
                    totalGap: document.getElementById('total_gap_val').innerText,
                    notes: document.getElementById('notes').value
                };
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert('✅ 紀錄已成功同步。');
            } catch (e) { alert('儲存失敗'); }
            finally { btn.innerText = '儲存諮詢紀錄'; btn.disabled = false; }
        }
    </script>
</body>
</html>
