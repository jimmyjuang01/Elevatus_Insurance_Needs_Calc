<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevatus 保障需求分析系統 v5.1 | Jimmy Chuang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        /* 網頁 UI */
        .card-box { background-color: white; padding: 2rem; border-radius: 2rem; box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1); border: 1px solid #f1f5f9; margin-bottom: 2rem; }
        .section-title { font-size: 1.25rem; font-weight: 900; margin-bottom: 1.5rem; display: flex; align-items: center; border-left: 5px solid; padding-left: 1rem; }
        .input-label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .input-field { width: 100%; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0.875rem 1rem; color: #1e293b; font-weight: 700; outline: none; }
        .ltc-card { display: flex; align-items: center; padding: 1rem; border-radius: 0.75rem; border: 2px solid #f1f5f9; background-color: white; transition: all 0.2s; margin-bottom: 0.75rem; }
        .ltc-card.active { border-color: #a855f7; background-color: #faf5ff; }
        .toggle-checkbox:checked { right: 0; border-color: #10b981; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10b981; }

        /* 🚀 V5.1 終極列印優化：移除背景框，直接列印內容 */
        @media print {
            @page { 
                size: letter; 
                margin: 15mm !important; 
            }
            body { background-color: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; padding: 0 !important; }
            
            /* 1. 移除卡片感：取消所有背景、圓角與邊框 */
            .card-box, #report-summary-panel > div { 
                background: transparent !important; 
                border: none !important; 
                box-shadow: none !important; 
                padding: 0 !important; 
                margin-bottom: 25px !important; 
                border-radius: 0 !important;
                page-break-inside: avoid !important;
            }
            
            /* 2. 重新設計標題樣式，適合文檔閱讀 */
            .section-title { 
                border-left: 4px solid #1e293b !important; 
                border-bottom: 1px solid #e2e8f0 !important;
                padding-bottom: 5px !important;
                margin-top: 20px !important;
                color: black !important;
            }
            
            /* 3. 摘要面板扁平化：去除圓角藍框 */
            #report-summary-panel { order: -1 !important; width: 100% !important; margin-bottom: 30px !important; }
            #report-summary-panel .bg-blue-600 { 
                background-color: #f1f5f9 !important; /* 改為淺灰背景增加質感 */
                color: black !important; 
                border: 1px solid #1e293b !important;
                border-radius: 0 !important;
                padding: 15px !important;
                clip-path: none !important;
            }
            #report-summary-panel .text-white { color: black !important; }
            #total_gap_val { color: #2563eb !important; text-decoration: underline; }

            /* 4. 底線化數值欄位 */
            .input-field, select, .consultant-input, .child-age-input, .child-name { 
                border: none !important; border-bottom: 1px solid black !important; 
                background: transparent !important; padding: 0 !important; 
                border-radius: 0 !important; -webkit-appearance: none !important; 
                color: black !important; font-weight: 700 !important;
            }
            .input-label { color: #64748b !important; font-size: 9px !important; margin-bottom: 2px !important; }
            
            /* 5. 強制雙欄佈局 */
            .grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 15px !important; }
            .sm\:col-span-2, .lg\:w-7\/12, .lg\:w-5\/12 { width: 100% !important; grid-column: span 2 / span 2 !important; }
            
            /* 隱藏無關元素 */
            .no-print, button, input[type="range"], #inflation_control, .flex.justify-end.mb-3 { display: none !important; }
            .ltc-card:not(.active) { display: none !important; }
        }

        #print-footer { display: none; }
        @media print {
            #print-footer { display: block; position: fixed; bottom: 0; left: 0; right: 0; text-align: center; font-size: 8px; color: #94a3b8; padding: 5px 0; border-top: 0.5px solid #f1f5f9; }
        }
    </style>
</head>
<body class="p-4 sm:p-6 lg:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="./logo.png" alt="Elevatus Logo" class="h-10 sm:h-14 object-contain">
                <div class="border-l-2 border-slate-200 pl-4">
                    <h1 class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight app-title-print">
                        <span data-i18n="app_title">保障需求分析</span>
                        <span class="text-blue-600 text-sm no-print">v5.1</span>
                    </h1>
                    <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest mt-1">Cross-Border Financial Consulting</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button id="langBtnDesktop" onclick="toggleLang()" class="no-print bg-slate-100 px-3 py-2 rounded-lg font-bold text-xs">EN / 中</button>
                <div class="bg-white px-6 py-4 rounded-2xl border border-slate-200 shadow-sm">
                    <span class="text-xs font-bold text-slate-400 uppercase" data-i18n="advisor">顧問:</span>
                    <input list="consultants" id="consultant_name" class="consultant-input" value="Jimmy Chuang">
                    <datalist id="consultants"><option value="Jimmy Chuang"><option value="Wendy Yun"><option value="Steve Yun"><option value="Pablo Lin"></datalist>
                    <p id="display_date" class="text-[10px] text-slate-400 font-bold mt-1 text-right"></p>
                </div>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8 items-start">
            <div class="w-full lg:w-7/12 xl:w-2/3">
                <section class="card-box">
                    <h2 class="section-title border-blue-500 text-blue-600" data-i18n="sec0_title">00. 客戶基本資料</h2>
                    <div class="grid grid-cols-2 gap-x-6 gap-y-5">
                        <div><label class="input-label" data-i18n="client_name">客戶姓名</label><input type="text" id="client_name" value="王先生" class="input-field"></div>
                        <div><label class="input-label" data-i18n="gender">性別</label><select id="client_gender" class="input-field cursor-pointer"><option data-i18n="male">男</option><option data-i18n="female">女</option></select></div>
                        <div><label class="input-label" data-i18n="age">目前年齡</label><input type="number" id="client_age" value="35" class="input-field" oninput="calculate()"></div>
                        <div><label class="input-label" data-i18n="phone">聯絡電話</label><input type="text" id="client_phone" class="input-field" placeholder="(XXX) XXX-XXXX"></div>
                        <div class="sm:col-span-2"><label class="input-label" data-i18n="email">E-mail</label><input type="email" id="client_email" class="input-field" placeholder="example@email.com"></div>
                        <div class="sm:col-span-2 border-t border-slate-100 pt-5 mt-2">
                            <label class="input-label text-blue-600" data-i18n="child_count">子女數量</label>
                            <input type="number" id="master_child_count" value="1" min="0" class="input-field w-24" oninput="generateChildRows()">
                            <div id="child_rows_container" class="mt-4 space-y-3"></div>
                        </div>
                        <div class="sm:col-span-2"><label class="input-label text-slate-400" data-i18n="notes">諮詢備註</label><input type="text" id="notes" value="一家四口" class="input-field text-sm"></div>
                    </div>
                </section>

                <section class="card-box">
                    <h2 class="section-title border-red-500 text-red-600" data-i18n="sec1_title">01. 家庭責任與身故保障</h2>
                    <div class="grid grid-cols-2 gap-x-6 gap-y-5">
                        <div><label class="input-label" data-i18n="mortgage">房屋貸款餘額 (USD)</label><input type="text" id="mortgage" value="$350,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label" data-i18n="other_debt">其他個人/商業貸款</label><input type="text" id="other_debt" value="$100,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label" data-i18n="annual_income">目前年收入 (USD)</label><input type="text" id="annual_income" value="$80,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label" data-i18n="income_years">預計替代年數</label><select id="income_years" onchange="calculate()" class="input-field cursor-pointer"><option value="5" data-i18n="yr_5">5 年</option><option value="10" selected data-i18n="yr_10">10 年</option><option value="15" data-i18n="yr_15">15 年</option></select></div>
                        <div><label class="input-label" data-i18n="edu_budget">每位子女教育預算</label><input type="text" id="edu_per_child" value="$150,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label" data-i18n="child_sync">子女數量 (同步)</label><input type="text" id="child_count" value="1" class="input-field" readonly></div>
                    </div>
                </section>

                <section class="card-box">
                    <h2 class="section-title border-orange-400 text-orange-500" data-i18n="sec2_title">02. 醫療與重疾應急金</h2>
                    <div class="grid grid-cols-2 gap-6">
                        <div><label class="input-label" data-i18n="oop_max">醫療自付上限預留</label><input type="text" id="medical_oop" value="$18,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label" data-i18n="recovery_fund">重大疾病應急金</label><input type="text" id="recovery_fund" value="$160,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                    </div>
                </section>

                <section class="card-box">
                    <h2 class="section-title border-purple-500 text-purple-600" data-i18n="sec3_title">03. 長期照護路徑與方案選取</h2>
                    <div class="flex bg-slate-100 p-1.5 rounded-xl mb-6 gap-1 no-print">
                        <button id="btn_us" onclick="setLTCPath('US')" class="flex-1 py-3 rounded-lg font-black text-sm bg-white shadow text-purple-600">美國在地照護 (US)</button>
                        <button id="btn_tw" onclick="setLTCPath('TW')" class="flex-1 py-3 rounded-lg font-bold text-sm text-slate-500">返回台灣照護 (TW)</button>
                    </div>
                    <div class="grid grid-cols-2 gap-6 mb-6">
                        <div><label class="input-label text-purple-600" data-i18n="ltc_duration">選擇預計照護時間長度</label><select id="ltc_duration" onchange="calculate()" class="input-field cursor-pointer bg-white"><option value="12" data-i18n="mo_12">12 個月</option><option value="24" data-i18n="mo_24">24 個月</option><option value="36" selected data-i18n="mo_36">36 個月</option><option value="48" data-i18n="mo_48">48 個月</option><option value="60" data-i18n="mo_60">60 個月</option></select></div>
                        <div><label class="input-label text-purple-600" data-i18n="ltc_start_age">預計啟動長照年齡</label><input type="number" id="ltc_start_age" value="75" class="input-field bg-white" oninput="calculate()"></div>
                    </div>
                    <div id="us_ltc_details">
                        <div class="flex justify-end mb-3 no-print"><a href="https://www.carescout.com/cost-of-care" target="_blank" class="text-xs font-bold text-blue-500 flex items-center gap-1" data-i18n="carescout_link">查詢 CareScout 最新費率</a></div>
                        <div class="ltc-card active" id="card_inhome" onclick="selectLtcType('inhome')"><input type="radio" name="ltc_type" id="radio_inhome" value="inhome" checked class="no-print"><div class="ml-4 flex-grow"><label class="text-[11px] font-bold text-slate-400 uppercase block mb-1" data-i18n="us_inhome">In-Home Care</label><input type="text" id="us_inhome" value="$5,529" class="w-full bg-transparent border-b border-slate-200 py-1 font-black text-slate-800 outline-none" oninput="handleCurrencyInput(this)"></div></div>
                        <div class="ltc-card" id="card_assisted" onclick="selectLtcType('assisted')"><input type="radio" name="ltc_type" id="radio_assisted" value="assisted" class="no-print"><div class="ml-4 flex-grow"><label class="text-[11px] font-bold text-slate-400 uppercase block mb-1" data-i18n="us_assisted">Assisted Living</label><input type="text" id="us_assisted" value="$6,350" class="w-full bg-transparent border-b border-slate-200 py-1 font-black text-slate-800 outline-none" oninput="handleCurrencyInput(this)"></div></div>
                        <div class="ltc-card" id="card_nursing" onclick="selectLtcType('nursing')"><input type="radio" name="ltc_type" id="radio_nursing" value="nursing" class="no-print"><div class="ml-4 flex-grow"><label class="text-[11px] font-bold text-slate-400 uppercase block mb-1" data-i18n="us_nursing">Nursing Home</label><input type="text" id="us_nursing" value="$8,015" class="w-full bg-transparent border-b border-slate-200 py-1 font-black text-slate-800 outline-none" oninput="handleCurrencyInput(this)"></div></div>
                    </div>
                    <div id="tw_ltc_details" class="hidden">
                        <div class="ltc-card active border-purple-500 bg-purple-50/50"><div class="flex-grow px-3"><label class="text-[11px] font-bold text-purple-600 uppercase block mb-1" data-i18n="tw_monthly">台灣照護月費估算</label><input type="text" id="tw_monthly" value="$3,200" class="w-full bg-transparent border-b border-purple-200 py-1 font-black text-purple-800 outline-none" oninput="handleCurrencyInput(this)"></div></div>
                    </div>
                </section>

                <section class="card-box">
                    <h2 class="section-title border-emerald-500 text-emerald-600" data-i18n="sec4_title">04. 現有資產與保障</h2>
                    <div class="grid grid-cols-2 gap-6">
                        <div><label class="input-label text-emerald-600" data-i18n="cur_ins">目前已有總保額 (USD)</label><input type="text" id="current_insurance" value="$300,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label text-emerald-600" data-i18n="cur_assets">流動性存款/投資 (USD)</label><input type="text" id="current_assets" value="$100,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                    </div>
                </section>
            </div>

            <div id="report-summary-panel" class="w-full lg:w-5/12 xl:w-1/3 lg:sticky lg:top-10">
                <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-100 flex flex-col">
                    <div class="bg-blue-600 p-8 text-center text-white">
                        <h3 class="text-sm font-black opacity-90 uppercase tracking-widest mb-2" data-i18n="summary_title">保障缺口分析總覽</h3>
                        <div id="total_gap_val" class="text-4xl sm:text-5xl font-black tracking-tighter">$0</div>
                    </div>
                    <div class="bg-slate-800 px-8 py-5 border-b border-slate-700 no-print">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-bold text-emerald-400 flex items-center gap-1.5" data-i18n="fv_toggle">啟用通膨精算 (FV)</span>
                            <div class="relative inline-block w-12 select-none"><input type="checkbox" id="fv_toggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-slate-600 appearance-none cursor-pointer" onchange="toggleFV()"/><label for="fv_toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-600 cursor-pointer"></label></div>
                        </div>
                        <div id="inflation_control" class="hidden"><div class="flex justify-between text-slate-300 text-xs font-bold mb-2"><span data-i18n="inflation_rate">年通膨率</span><span id="inflation_display" class="text-white font-black">3.0%</span></div><input type="range" id="inflation_rate" min="0" max="10" step="0.5" value="3" class="w-full accent-emerald-500" oninput="updateInflationLabel(); calculate();"></div>
                    </div>
                    <div class="p-8 bg-white flex-grow">
                        <div class="relative h-48 sm:h-56 w-full mb-8"><canvas id="gapChart"></canvas></div>
                        <div class="space-y-4 mb-8">
                            <div class="flex justify-between border-b pb-2"><p class="text-xs font-bold text-slate-400" data-i18n="disp_life">身故保障需求</p><p id="life_need_display" class="text-lg font-black text-red-500">$0</p></div>
                            <div class="flex justify-between border-b pb-2"><p class="text-xs font-bold text-slate-400" data-i18n="disp_med">生前福利需求</p><p id="medical_need_display" class="text-lg font-black text-orange-500">$0</p></div>
                            <div class="flex justify-between border-b pb-2"><p class="text-xs font-bold text-slate-400" data-i18n="disp_ltc">長期照護預備</p><p id="ltc_need_display" class="text-lg font-black text-purple-600">$0</p></div>
                            <div class="flex justify-between border-b pb-2"><p class="text-xs font-bold text-slate-400" data-i18n="disp_assets">現有資產與保障</p><p id="assets_display" class="text-lg font-black text-emerald-500">$0</p></div>
                        </div>
                        <div class="space-y-3 no-print">
                            <button id="saveBtn" onclick="saveToSheet()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-slate-800 shadow-lg active:scale-95 text-sm" data-i18n="btn_save">儲存諮詢紀錄</button>
                            <button onclick="handlePrint()" class="w-full bg-slate-50 text-slate-600 font-bold py-3.5 rounded-xl text-sm border border-slate-200" data-i18n="btn_print">列印 PDF 報告</button>
                            <button onclick="clearAllData()" class="w-full text-slate-400 hover:text-red-500 font-bold py-2 text-xs transition-colors" data-i18n="btn_reset">↺ 重置所有資料</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer id="print-footer">
        © <span id="year-display"></span> Elevatus Business Consultants. 本報告內容僅供初步財務分析規劃參考。
    </footer>

    <script>
        const dict = {
            zh: { app_title: "保障需求分析", advisor: "顧問:", sec0_title: "00. 客戶基本資料", client_name: "客戶姓名", gender: "性別", male: "男", female: "女", age: "目前年齡", phone: "聯絡電話", email: "E-mail", child_count: "子女數量", notes: "諮詢備註", sec1_title: "01. 家庭責任與身故保障", mortgage: "房屋貸款餘額 (USD)", other_debt: "其他個人/商業貸款", annual_income: "目前年收入 (USD)", income_years: "預計替代年數", yr_5: "5 年", yr_10: "10 年", yr_15: "15 年", edu_budget: "每位子女教育預算", child_sync: "子女數量 (同步)", sec2_title: "02. 醫療與重疾應急金", oop_max: "醫療自付上限預留", recovery_fund: "重大疾病應急金", sec3_title: "03. 長期照護路徑與方案選取", us_care: "美國在地照護 (US)", tw_care: "返回台灣照護 (TW)", carescout_link: "查詢 CareScout 最新費率", ltc_duration: "選擇預計照護時間長度", mo_12: "12 個月", mo_24: "24 個月", mo_36: "36 個月", mo_48: "48 個月", mo_60: "60 個月", ltc_start_age: "預計啟動長照年齡", us_inhome: "In-Home Care", us_assisted: "Assisted Living", us_nursing: "Nursing Home", tw_monthly: "台灣照護月費估算", sec4_title: "04. 現有資產與保障", cur_ins: "目前已有總保額 (USD)", cur_assets: "流動性存款/投資 (USD)", summary_title: "保障缺口分析總覽", fv_toggle: "啟用通膨精算 (FV)", inflation_rate: "年通膨率", disp_life: "身故保障需求", disp_med: "生前福利需求", disp_ltc: "長期照護預備", disp_assets: "現有資產與保障", btn_save: "儲存諮詢紀錄", btn_print: "列印 PDF 報告", btn_reset: "↺ 重置所有資料", child_name_lb: "姓名", child_gender_lb: "性別", child_age_lb: "目前年齡", chart_gap: "家庭保障缺口", filename_pref: "保障需求分析" },
            en: { app_title: "Coverage Needs Analysis", advisor: "Advisor:", sec0_title: "00. Client Information", client_name: "Client Name", gender: "Gender", male: "Male", female: "Female", age: "Current Age", phone: "Phone", email: "E-mail", child_count: "No. of Children", notes: "Notes", sec1_title: "01. Family Obligations & Life Need", mortgage: "Mortgage Balance (USD)", other_debt: "Other Debts (USD)", annual_income: "Annual Income (USD)", income_years: "Income Replacement", yr_5: "5 Years", yr_10: "10 Years", yr_15: "15 Years", edu_budget: "Edu Budget / Child", child_sync: "No. of Children (Synced)", sec2_title: "02. Living Benefits & Critical Illness", oop_max: "Medical OOP Max", recovery_fund: "Recovery Fund", sec3_title: "03. Long-Term Care Strategy", us_care: "U.S. Care (US)", tw_care: "Return to Taiwan (TW)", carescout_link: "Check Rates on CareScout", ltc_duration: "Care Duration", mo_12: "12 Months", mo_24: "24 Months", mo_36: "36 Months", mo_48: "48 Months", mo_60: "60 Months", ltc_start_age: "Exp. LTC Start Age", us_inhome: "In-Home Care", us_assisted: "Assisted Living", us_nursing: "Nursing Home", tw_monthly: "Taiwan LTC Est.", sec4_title: "04. Current Assets & Coverage", cur_ins: "Total Coverage (USD)", cur_assets: "Liquid Assets (USD)", summary_title: "Total Protection Gap", fv_toggle: "Enable Inflation (FV)", inflation_rate: "Inflation Rate", disp_life: "Life Insurance Need", disp_med: "Living Benefits Need", disp_ltc: "LTC Preparation", disp_assets: "Current Assets", btn_save: "Save Record", btn_print: "Print PDF Report", btn_reset: "↺ Reset All Data", child_name_lb: "Name", child_gender_lb: "Gender", child_age_lb: "Age", chart_gap: "Total Protection Gap", filename_pref: "Coverage_Needs_Analysis" }
        };
        let currentLang = 'zh';

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateLangButtonUI();
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[currentLang][key]) {
                    if (el.children.length > 0) el.childNodes[el.childNodes.length - 1].nodeValue = " " + dict[currentLang][key];
                    else el.innerHTML = dict[currentLang][key];
                }
            });
            generateChildRows(); calculate();
        }

        function updateLangButtonUI() {
            const zhHTML = currentLang === 'zh' ? '<span class="text-slate-400">EN</span> / <span class="text-blue-600 font-black">中</span>' : '<span class="text-blue-600 font-black">EN</span> / <span class="text-slate-400">中</span>';
            document.getElementById('langBtnDesktop').innerHTML = zhHTML;
        }

        function handlePrint() {
            const originalTitle = document.title;
            const advisor = document.getElementById('consultant_name').value || "No_Name";
            const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
            const prefix = dict[currentLang].filename_pref;
            document.title = `${prefix}_${dateStr}_${advisor}`;
            window.print();
            setTimeout(() => { document.title = originalTitle; }, 1000);
        }

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEsNTWhldPnUc1xxnUHJcaH14Wbd0J1CMSOnhI9r_5ckZ-jRwHEhPR1lZdptHe3H6o/exec";
        let currentLTCPath = 'US';
        let myChart = null;
        let previousTotalGap = 0; 
        window.chartBreakdown = { life: [], med: [], ltc: [] };

        function formatUSD(val) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(val); }
        function parseCurrency(str) { return parseFloat(String(str).replace(/[$,]/g, '')) || 0; }
        function handleCurrencyInput(el) {
            let cursor = el.selectionStart;
            let len = el.value.length;
            let val = el.value.replace(/[^\d]/g, '');
            if (val === '') { el.value = ''; calculate(); return; }
            el.value = formatUSD(parseInt(val, 10));
            el.setSelectionRange(cursor + (el.value.length - len), cursor + (el.value.length - len));
            calculate();
        }

        function generateChildRows() {
            const count = parseInt(document.getElementById('master_child_count').value) || 0;
            const container = document.getElementById('child_rows_container');
            document.getElementById('child_count').value = count;
            const savedData = Array.from(container.children).map(r => ({
                name: r.querySelector('.child-name').value, gender: r.querySelector('.child-gender').value, age: r.querySelector('.child-age-input').value
            }));
            container.innerHTML = '';
            const t = dict[currentLang];
            for (let i = 0; i < count; i++) {
                const data = savedData[i] || { name: `${t.child_name_lb} ${i+1}`, gender: t.male, age: '0' };
                const row = document.createElement('div');
                row.className = 'flex flex-wrap sm:flex-nowrap gap-3 items-center bg-blue-50/50 p-3 rounded-xl border border-blue-100';
                row.innerHTML = `
                    <div class="w-full sm:flex-1"><label class="text-[10px] text-blue-500 font-bold block mb-1">${t.child_name_lb}</label><input type="text" class="child-name w-full bg-white border border-blue-200 rounded-lg px-3 py-2 text-sm font-bold text-slate-700 outline-none" value="${data.name}"></div>
                    <div class="w-full sm:w-24"><label class="text-[10px] text-blue-500 font-bold block mb-1">${t.child_gender_lb}</label><select class="child-gender w-full bg-white border border-blue-200 rounded-lg px-2 py-2 text-sm font-bold text-slate-700 outline-none"><option ${data.gender===t.male?'selected':''}>${t.male}</option><option ${data.gender===t.female?'selected':''}>${t.female}</option></select></div>
                    <div class="w-full sm:w-24"><label class="text-[10px] text-blue-500 font-bold block mb-1">${t.child_age_lb}</label><input type="number" min="0" class="child-age-input w-full bg-white border border-blue-200 rounded-lg px-3 py-2 text-sm font-bold text-slate-700 outline-none" value="${data.age}" oninput="calculate()"></div>
                `;
                container.appendChild(row);
            }
            calculate();
        }

        function toggleFV() { document.getElementById('inflation_control').classList.toggle('hidden', !document.getElementById('fv_toggle').checked); calculate(); }
        function updateInflationLabel() { document.getElementById('inflation_display').innerText = document.getElementById('inflation_rate').value + '%'; }

        function calculate() {
            const t = dict[currentLang];
            const isFV = document.getElementById('fv_toggle').checked;
            const r = isFV ? (parseFloat(document.getElementById('inflation_rate').value) / 100) || 0 : 0;
            const fvTag = isFV ? " (FV)" : "";
            const clientAge = parseInt(document.getElementById('client_age').value) || 35;
            const mortgage = parseCurrency(document.getElementById('mortgage').value);
            const otherDebt = parseCurrency(document.getElementById('other_debt').value);
            const annual = parseCurrency(document.getElementById('annual_income').value);
            const years = parseInt(document.getElementById('income_years').value) || 10;
            let incomeReplacement = r > 0 ? annual * (Math.pow(1 + r, years) - 1) / r : annual * years;
            let eduTotal = 0; const eduDetails = [];
            document.querySelectorAll('.child-age-input').forEach((input, i) => {
                const cost = parseCurrency(document.getElementById('edu_per_child').value) * Math.pow(1 + r, Math.max(0, 18 - (parseInt(input.value) || 0)));
                eduTotal += cost;
                eduDetails.push(`${document.querySelectorAll('.child-name')[i].value}: ${formatUSD(cost)}`);
            });
            const lifeNeed = mortgage + otherDebt + incomeReplacement + eduTotal;
            const medNeed = (parseCurrency(document.getElementById('medical_oop').value) + parseCurrency(document.getElementById('recovery_fund').value)) * Math.pow(1 + r, Math.max(0, 65 - clientAge));
            const ltcNeed = (parseCurrency(document.getElementById(currentLTCPath === 'US' ? 'us_' + document.querySelector('input[name="ltc_type"]:checked').value : 'tw_monthly').value) * (parseInt(document.getElementById('ltc_duration').value) || 36)) * Math.pow(1 + r, Math.max(0, (parseInt(document.getElementById('ltc_start_age').value) || 75) - clientAge));
            const assets = parseCurrency(document.getElementById('current_insurance').value) + parseCurrency(document.getElementById('current_assets').value);
            const gap = Math.max(0, (lifeNeed + medNeed + ltcNeed) - assets);

            window.chartBreakdown = { life: [`Mortgage: ${formatUSD(mortgage)}`, `Other: ${formatUSD(otherDebt)}`, `${years}Yr Inc${fvTag}: ${formatUSD(incomeReplacement)}`, ...eduDetails], med: [`OOP Max${fvTag}: ${formatUSD(parseCurrency(document.getElementById('medical_oop').value) * Math.pow(1+r, Math.max(0, 65 - clientAge)))}`, `Recovery${fvTag}: ${formatUSD(parseCurrency(document.getElementById('recovery_fund').value) * Math.pow(1+r, Math.max(0, 65 - clientAge)))}`], ltc: [`Total Est.${fvTag}: ${formatUSD(ltcNeed)}`] };
            document.getElementById('life_need_display').innerText = formatUSD(lifeNeed);
            document.getElementById('medical_need_display').innerText = formatUSD(medNeed);
            document.getElementById('ltc_need_display').innerText = formatUSD(ltcNeed);
            document.getElementById('assets_display').innerText = formatUSD(assets);
            document.getElementById('total_gap_val').innerText = formatUSD(gap);
            updateChart(lifeNeed, medNeed, ltcNeed, parseCurrency(document.getElementById('current_insurance').value), parseCurrency(document.getElementById('current_assets').value));
        }

        function initChart() {
            const ctx = document.getElementById('gapChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut', data: { datasets: [{ data: [1, 1, 1], backgroundColor: ['#ef4444', '#f97316', '#a855f7'], borderWidth: 0, weight: 1.5 }, { data: [1, 1, 1], backgroundColor: ['#10b981', '#6ee7b7', '#f1f5f9'], borderWidth: 0, weight: 1 }] },
                options: { cutout: '45%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.95)', padding: 16, cornerRadius: 12, callbacks: {
                    title: (i) => { const t = dict[currentLang]; return i[0].datasetIndex === 0 ? [t.disp_life, t.disp_med, t.disp_ltc][i[0].dataIndex] : [t.cur_ins.split(' ')[0], t.cur_assets.split(' ')[0], t.chart_gap][i[0].dataIndex]; },
                    label: (ctx) => { const tag = document.getElementById('fv_toggle').checked ? " (FV)" : ""; if (ctx.datasetIndex === 0) { if (ctx.dataIndex === 0) return ['【Total'+tag+': ' + formatUSD(ctx.parsed) + '】', ...window.chartBreakdown.life]; if (ctx.dataIndex === 1) return ['【Total'+tag+': ' + formatUSD(ctx.parsed) + '】', ...window.chartBreakdown.med]; if (ctx.dataIndex === 2) return ['【Total'+tag+': ' + formatUSD(ctx.parsed) + '】', ...window.chartBreakdown.ltc]; } else return formatUSD(ctx.parsed); }
                } } } }
            });
        }

        function updateChart(life, med, ltc, ins, asset) {
            myChart.data.datasets[0].data = [life, med, ltc];
            myChart.data.datasets[1].data = [ins, asset, Math.max(0, (life + med + ltc) - (ins + asset))];
            myChart.update();
        }

        function setLTCPath(path) {
            currentLTCPath = path;
            document.getElementById('btn_us').className = (path === 'US') ? "flex-1 py-3 rounded-lg font-black text-sm bg-white shadow text-purple-600" : "flex-1 py-3 rounded-lg font-bold text-sm text-slate-500";
            document.getElementById('btn_tw').className = (path === 'TW') ? "flex-1 py-3 rounded-lg font-black text-sm bg-white shadow text-purple-600" : "flex-1 py-3 rounded-lg font-bold text-sm text-slate-500";
            document.getElementById('us_ltc_details').classList.toggle('hidden', path !== 'US');
            document.getElementById('tw_ltc_details').classList.toggle('hidden', path !== 'TW');
            calculate();
        }

        function selectLtcType(type) {
            document.getElementById('radio_' + type).checked = true;
            ['inhome', 'assisted', 'nursing'].forEach(t => document.getElementById('card_' + t).className = (t === type) ? "ltc-card active" : "ltc-card");
            calculate();
        }

        function clearAllData() {
            if (confirm(dict[currentLang].btn_reset + "?")) {
                ['client_name', 'client_phone', 'client_email', 'notes', 'mortgage', 'other_debt', 'annual_income', 'edu_per_child', 'medical_oop', 'recovery_fund'].forEach(f => document.getElementById(f).value = "");
                document.getElementById('master_child_count').value = "1";
                document.getElementById('fv_toggle').checked = false;
                toggleFV(); generateChildRows(); calculate();
            }
        }

        window.onload = function() {
            document.getElementById('display_date').innerText = new Date().toLocaleDateString();
            document.getElementById('year-display').innerText = new Date().getFullYear();
            updateLangButtonUI(); initChart(); generateChildRows(); calculate();
            fetch(SCRIPT_URL).then(res => res.json()).then(data => {
                if (data.TW_LTC_Monthly) document.getElementById('tw_monthly').value = formatUSD(data.TW_LTC_Monthly);
                if (data.US_InHome) document.getElementById('us_inhome').value = formatUSD(data.US_InHome);
                if (data.US_Assisted) document.getElementById('us_assisted').value = formatUSD(data.US_Assisted);
                if (data.US_Nursing) document.getElementById('us_nursing').value = formatUSD(data.US_Nursing);
                calculate();
            }).catch(e => calculate());
        };

        async function saveToSheet() {
            const btn = document.getElementById('saveBtn');
            const original = btn.innerText; btn.innerText = 'Syncing...'; btn.disabled = true;
            try {
                const childDetailsStr = Array.from(document.querySelectorAll('#child_rows_container > div')).map(r => `${r.querySelector('.child-name').value}(${r.querySelector('.child-gender').value},${r.querySelector('.child-age-input').value}歲)`).join('; ');
                const payload = {
                    consultant: document.getElementById('consultant_name').value,
                    name: document.getElementById('client_name').value || "Unnamed",
                    gender: document.getElementById('client_gender').value,
                    age: document.getElementById('client_age').value,
                    phone: document.getElementById('client_phone').value,
                    email: document.getElementById('client_email').value,
                    childCount: document.getElementById('master_child_count').value,
                    childDetails: childDetailsStr,
                    isFV: document.getElementById('fv_toggle').checked ? "Yes" : "No",
                    inflationRate: document.getElementById('inflation_rate').value + "%",
                    mortgage: document.getElementById('mortgage').value,
                    otherDebt: document.getElementById('other_debt').value,
                    annualIncome: document.getElementById('annual_income').value,
                    incomeYears: document.getElementById('income_years').options[document.getElementById('income_years').selectedIndex].text,
                    eduPerChild: document.getElementById('edu_per_child').value,
                    medicalOop: document.getElementById('medical_oop').value,
                    recoveryFund: document.getElementById('recovery_fund').value,
                    ltcPath: currentLTCPath,
                    ltcType: currentLTCPath === 'US' ? document.querySelector('input[name="ltc_type"]:checked').value : 'TW_LTC',
                    ltcMonthly: currentLTCPath === 'US' ? document.getElementById('us_' + document.querySelector('input[name="ltc_type"]:checked').value).value : document.getElementById('tw_monthly').value,
                    ltcDuration: document.getElementById('ltc_duration').options[document.getElementById('ltc_duration').selectedIndex].text,
                    ltcStartAge: document.getElementById('ltc_start_age').value,
                    currentIns: document.getElementById('current_insurance').value,
                    currentAssets: document.getElementById('current_assets').value,
                    lifeNeed: document.getElementById('life_need_display').innerText,
                    medNeed: document.getElementById('medical_need_display').innerText,
                    ltcNeed: document.getElementById('ltc_need_display').innerText,
                    assets: document.getElementById('assets_display').innerText,
                    totalGap: document.getElementById('total_gap_val').innerText,
                    notes: document.getElementById('notes').value
                };
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert(currentLang === 'zh' ? '✅ 諮詢紀錄已成功儲存。' : '✅ Record saved successfully.');
            } catch (e) { alert('Error saving data.'); }
            finally { btn.innerText = original; btn.disabled = false; }
        }
    </script>
</body>
