<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevatus 財務需求分析系統 v4.6 | Jimmy Chuang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        /* 基礎網頁 UI */
        .card-box { background-color: white; padding: 2rem; border-radius: 2rem; box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1); border: 1px solid #f1f5f9; margin-bottom: 2rem; }
        .section-title { font-size: 1.25rem; font-weight: 900; margin-bottom: 1.5rem; display: flex; align-items: center; border-left: 5px solid; padding-left: 1rem; }
        .input-label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .input-field { width: 100%; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0.875rem 1rem; color: #1e293b; font-weight: 700; outline: none; }
        .ltc-card { display: flex; align-items: center; padding: 1rem; border-radius: 0.75rem; border: 2px solid #f1f5f9; background-color: white; transition: all 0.2s; margin-bottom: 0.75rem; }
        .ltc-card.active { border-color: #a855f7; background-color: #faf5ff; }

        /* 🚀 v4.6 終極列印優化 (Report Mode) */
        @media print {
            @page { size: letter; margin: 12mm; }
            body { background-color: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            
            /* 1. 強制佈局結構 */
            .max-w-7xl { max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .flex-col.lg\:flex-row { display: block !important; }
            #report-summary-panel { order: -1 !important; margin-bottom: 30px !important; width: 100% !important; }
            
            /* 2. 徹底移除表單感 */
            .input-field, select, .consultant-input, .child-age-input, .child-name { 
                border: none !important; 
                border-bottom: 1px solid #000 !important; 
                background: transparent !important; 
                padding: 4px 0 !important; 
                border-radius: 0 !important; 
                -webkit-appearance: none !important; 
                appearance: none !important; 
                color: black !important;
                font-weight: 600 !important;
                box-shadow: none !important;
            }
            .input-label { color: #64748b !important; margin-bottom: 2px !important; font-size: 10px !important; }
            
            /* 3. 強制雙欄佈局 (排除手機響應式影響) */
            .grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 20px !important; }
            .sm\:col-span-2, .lg\:w-7\/12, .lg\:w-5\/12 { width: 100% !important; grid-column: span 2 / span 2 !important; }
            
            /* 4. 子女列橫向優化 */
            #child_rows_container > div { 
                display: grid !important; 
                grid-template-columns: 2fr 1fr 1fr !important; 
                background: transparent !important; 
                border: none !important; 
                border-bottom: 1px dashed #e2e8f0 !important;
                padding: 8px 0 !important;
            }

            /* 5. 區塊完整性與斷頁控制 */
            .card-box { 
                page-break-inside: avoid !important; 
                break-inside: avoid !important; 
                border: 1px solid #e2e8f0 !important; 
                border-radius: 12px !important;
                padding: 20px !important;
                margin-bottom: 25px !important;
            }
            
            /* 6. 隱藏不必要元素 */
            .no-print, button, input[type="range"], .no-print-ltc, #inflation_control, .flex.justify-end.mb-3 { display: none !important; }
            .ltc-card:not(.active) { display: none !important; }
            .ltc-card.active { border: 1px solid #a855f7 !important; background: transparent !important; padding: 10px !important; }
        }

        #print-footer { display: none; }
        @media print {
            #print-footer { display: block; position: fixed; bottom: 0; width: 100%; text-align: center; font-size: 8px; color: #94a3b8; padding: 5px 0; }
        }
    </style>
</head>
<body class="p-4 sm:p-6 lg:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="./logo.png" alt="Elevatus Logo" class="h-10 sm:h-14 object-contain">
                <div class="border-l-2 border-slate-200 pl-4">
                    <h1 class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight">
                        <span data-i18n="app_title">Coverage Needs Analysis</span>
                        <span class="text-blue-600 text-sm no-print">v4.6</span>
                    </h1>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button id="langBtnDesktop" onclick="toggleLang()" class="no-print bg-slate-100 px-3 py-2 rounded-lg font-bold text-xs">EN / 中</button>
                <div class="bg-white px-6 py-4 rounded-2xl border border-slate-200 shadow-sm">
                    <span class="text-xs font-bold text-slate-400 uppercase" data-i18n="advisor">顧問:</span>
                    <input list="consultants" id="consultant_name" class="consultant-input" value="Jimmy Chuang">
                    <datalist id="consultants"><option value="Jimmy Chuang"><option value="Wendy Yun"><option value="Steve Yun"></datalist>
                    <p id="display_date" class="text-[10px] text-slate-400 font-bold mt-1 text-right"></p>
                </div>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8 items-start">
            
            <div class="w-full lg:w-7/12 xl:w-2/3">
                <section class="card-box">
                    <h2 class="section-title border-blue-500 text-blue-600" data-i18n="sec0_title">00. 客戶基本資料</h2>
                    <div class="grid grid-cols-2 gap-6">
                        <div><label class="input-label" data-i18n="client_name">客戶姓名</label><input type="text" id="client_name" value="王先生" class="input-field"></div>
                        <div><label class="input-label" data-i18n="gender">性別</label><select id="client_gender" class="input-field"><option data-i18n="male">男</option><option data-i18n="female">女</option></select></div>
                        <div><label class="input-label" data-i18n="age">目前年齡</label><input type="number" id="client_age" value="35" class="input-field" oninput="calculate()"></div>
                        <div><label class="input-label" data-i18n="phone">聯絡電話</label><input type="text" id="client_phone" value="1234567890" class="input-field"></div>
                        <div class="sm:col-span-2"><label class="input-label" data-i18n="email">E-mail</label><input type="email" id="client_email" value="aaaa@aaaa.com" class="input-field"></div>
                        <div class="sm:col-span-2 pt-2">
                            <label class="input-label" data-i18n="child_count">子女數量</label>
                            <input type="number" id="master_child_count" value="1" min="0" class="input-field w-24" oninput="generateChildRows()">
                            <div id="child_rows_container" class="mt-4 space-y-3"></div>
                        </div>
                        <div class="sm:col-span-2"><label class="input-label text-slate-400" data-i18n="notes">諮詢備註</label><input type="text" id="notes" value="一家四口" class="input-field"></div>
                    </div>
                </section>

                <section class="card-box">
                    <h2 class="section-title border-red-500 text-red-600" data-i18n="sec1_title">01. 家庭責任與身故保障</h2>
                    <div class="grid grid-cols-2 gap-6">
                        <div><label class="input-label" data-i18n="mortgage">房屋貸款餘額 (USD)</label><input type="text" id="mortgage" value="$350,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label" data-i18n="other_debt">其他個人/商業貸款</label><input type="text" id="other_debt" value="$100,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label" data-i18n="annual_income">目前年收入 (USD)</label><input type="text" id="annual_income" value="$80,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label" data-i18n="income_years">預計替代年數</label><select id="income_years" onchange="calculate()" class="input-field"><option value="5" data-i18n="yr_5">5 年</option><option value="10" selected data-i18n="yr_10">10 年</option></select></div>
                        <div><label class="input-label" data-i18n="edu_budget">每位子女教育預算</label><input type="text" id="edu_per_child" value="$150,000" oninput="handleCurrencyInput(this)" class="input-field"></div>
                        <div><label class="input-label" data-i18n="child_sync">子女數量 (同步)</label><input type="text" id="child_count" value="1" class="input-field" readonly></div>
                    </div>
                </section>

                </div>

            <div id="report-summary-panel" class="w-full lg:w-5/12 xl:w-1/3 lg:sticky lg:top-10">
                <div class="bg-blue-600 rounded-[2.5rem] shadow-xl overflow-hidden text-white">
                    <div class="p-8 text-center">
                        <h3 class="text-sm font-black uppercase tracking-widest mb-2" data-i18n="summary_title">保障缺口分析總覽</h3>
                        <div id="total_gap_val" class="text-5xl font-black">$0</div>
                    </div>
                    <div class="p-8 bg-white text-slate-800">
                        <div class="relative h-48 mb-8"><canvas id="gapChart"></canvas></div>
                        <div class="space-y-4 mb-4">
                            <div class="flex justify-between border-b pb-2"><p class="text-xs font-bold" data-i18n="disp_life">身故保障需求</p><p id="life_need_display" class="font-black text-red-500">$0</p></div>
                            <div class="flex justify-between border-b pb-2"><p class="text-xs font-bold" data-i18n="disp_med">生前福利需求</p><p id="medical_need_display" class="font-black text-orange-500">$0</p></div>
                            <div class="flex justify-between border-b pb-2"><p class="text-xs font-bold" data-i18n="disp_ltc">長期照護預備</p><p id="ltc_need_display" class="font-black text-purple-600">$0</p></div>
                            <div class="flex justify-between border-b pb-2"><p class="text-xs font-bold" data-i18n="disp_assets">現有資產與保障</p><p id="assets_display" class="font-black text-emerald-500">$0</p></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer id="print-footer">
        © <span id="year-display"></span> Elevatus Business Consultants. 規劃僅供參考，不保證未來結果。
    </footer>

    <script>
        /* [JavaScript 邏輯保持 V4.4 優化版，確保數據精確度] */
        // ... (節省篇幅，請保留前述 V4.4 的所有 script 內容) ...
    </script>
</body>
</html>
